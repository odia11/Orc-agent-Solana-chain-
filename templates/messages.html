<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Messages — OrcAgent</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OrcAgent">
<link rel="apple-touch-icon" href="/static/favicon.svg?v=2">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a0b0e;color:#eef1f5;font-family:'Geist',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0a0b0e;--bg2:#101216;--bg3:#16191f;--bg4:#21252c;
  --accent:#f7b955;--text:#eef1f5;--muted:#565d68;--dim:#565d68;--green:#3ad29b;
  --border:#16191f;--border2:#21252c;
}

/* ── SHARED MODAL SHELL (mirrors dashboard.html) — used by _low_balance_modal.html ── */
.s-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,18,30,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:1rem}
.s-modal.open{display:flex}
.s-card{background:var(--bg2);border:1px solid rgba(247,185,85,.3);border-radius:14px;padding:26px 24px;width:100%;max-width:480px;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5)}
.s-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:4px}
.s-close:hover{color:var(--text)}
.s-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.s-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:18px}

/* ── SIDEBAR (mirrors dashboard) ── */
#sidebar{width:260px;min-width:260px;height:100vh;position:sticky;top:0;background:var(--bg);border-right:1px solid #16191f;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb{background:#21252c;border-radius:4px}
.sb-logo{padding:20px 20px 14px;flex-shrink:0}
.sb-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-logo-shape{width:36px;height:36px;min-width:36px;background:#f7b955;border-radius:11px;display:flex;align-items:center;justify-content:center}
.sb-logo-shape::after{content:'';width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:13px solid #0a0b0e}
.sb-logo-text{font-family:'Geist',system-ui,sans-serif;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.sb-beta-badge{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:600;letter-spacing:.14em;color:#f7b955;background:rgba(247,185,85,.1);border:1px solid rgba(247,185,85,.3);border-radius:7px;padding:5px 9px}
.sb-beta-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#f7b955;flex-shrink:0}
.sb-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:1px}
.sb-nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;font-family:'Geist',system-ui,sans-serif;font-size:14px;font-weight:500;color:#8a919c;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;border:none;background:transparent;width:100%;text-align:left;border-radius:11px;box-sizing:border-box;position:relative}
.sb-nav-item:hover{background:#14171c;color:#eef1f5}
.sb-nav-item.active{background:rgba(247,185,85,.12);color:#eef1f5;font-weight:600}
.sb-nav-item.active::after{content:'';position:absolute;right:12px;width:6px;height:6px;border-radius:50%;background:#f7b955}
.sb-nav-icon{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.sb-nav-badge{margin-left:auto;background:#f7b955;color:#0a0b0e;font-size:9px;font-weight:700;border-radius:999px;padding:2px 7px;min-width:18px;text-align:center}
.sb-bottom{padding:12px;border-top:1px solid var(--bg3);flex-shrink:0;margin-top:auto}
.sb-user-card{display:flex;align-items:center;gap:11px;padding:10px;border-radius:14px;background:transparent;border:1px solid #16191f;cursor:pointer;transition:background .15s}
.sb-user-card:hover{background:#101216}
.sb-avatar{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;overflow:hidden;position:relative}
.sb-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:14px;font-weight:600;color:#eef1f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-handle{font-size:12px;color:#565d68;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.sb-sol-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.sb-sol{font-size:13px;font-weight:700;color:#eef1f5;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.sb-sol-label{font-size:10px;color:#565d68;font-family:'JetBrains Mono',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── APP SHELL ── */
#app{display:flex;height:100vh;overflow:hidden}
.msgs-main{flex:1;display:flex;min-width:0}

/* ── CONVERSATION LIST (300px left pane) ── */
.msgs-left{width:300px;min-width:300px;border-right:1px solid #16191f;display:flex;flex-direction:column;height:100vh;flex-shrink:0;background:#0a0b0e}
.msgs-left-hdr{padding:16px 16px 12px;border-bottom:1px solid #16191f;flex-shrink:0}
.msgs-left-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.msgs-left-title{font-size:16px;font-weight:700;color:#eef1f5}
.msgs-home-back{display:none}
.msgs-new-btn{background:#f7b955;color:#0a0b0e;border:none;border-radius:50%;width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;font-family:'Geist',system-ui,sans-serif;transition:opacity .15s}
.msgs-new-btn:hover{opacity:.85}
.msgs-search-wrap{position:relative}
.msgs-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#565d68;pointer-events:none}
.msgs-search{width:100%;background:#101216;border:1px solid #21252c;border-radius:11px;padding:9px 13px 9px 36px;color:#eef1f5;font-size:13px;font-family:'Geist',system-ui,sans-serif;outline:none;transition:border-color .15s}
.msgs-search::placeholder{color:#565d68}
.msgs-search:focus{border-color:rgba(247,185,85,.4)}
#newMsgBar{display:none;padding:12px 16px;border-bottom:1px solid #16191f}
.new-msg-input{width:100%;background:#101216;border:1px solid #21252c;border-radius:10px;padding:10px 12px;color:#eef1f5;font-size:13px;font-family:'Geist',system-ui,sans-serif;outline:none;transition:border-color .15s}
.new-msg-input::placeholder{color:#565d68}
.new-msg-input:focus{border-color:rgba(247,185,85,.4)}
.conv-list{flex:1;overflow-y:auto}
.conv-row-wrap{position:relative;overflow:hidden}
.conv-delete-btn{position:absolute;top:0;right:0;height:100%;width:84px;background:#ff3b3b;color:#fff;border:none;font-size:12px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation}
.conv-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #0d0f12;cursor:pointer;transition:background .12s;background:#0a0b0e;touch-action:pan-y}
.conv-row:hover{background:#0e1014}
.conv-row.active{background:#101216}
.conv-avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff}
#avatar-lightbox{display:none;position:fixed;inset:0;background:rgba(10,11,14,.85);z-index:9999;align-items:center;justify-content:center;cursor:pointer}
#avatar-lightbox.open{display:flex}
#avatar-lightbox img{max-width:min(360px,80vw);max-height:min(360px,80vh);border-radius:16px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#img-lightbox{display:none;position:fixed;inset:0;background:rgba(10,11,14,.9);z-index:9999;align-items:center;justify-content:center;cursor:pointer}
#img-lightbox.open{display:flex}
#img-lightbox img{max-width:90vw;max-height:88vh;border-radius:12px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5);cursor:default}
#img-lightbox-close{position:fixed;top:20px;right:20px;background:rgba(10,11,14,.7);border:1px solid rgba(247,185,85,.35);border-radius:50%;width:40px;height:40px;color:#f7b955;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;font-family:'Geist',system-ui,sans-serif}
#img-lightbox-close:hover{background:rgba(247,185,85,.12);border-color:#f7b955}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:14px;font-weight:600;color:#eef1f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:12px;color:#565d68;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-preview.unread{color:#c7ccd4}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.conv-time{font-size:11px;color:#565d68;white-space:nowrap}
.conv-badge{background:#f7b955;color:#0a0b0e;border-radius:999px;font-size:10px;font-weight:700;padding:2px 7px}
.msgs-left-empty{padding:48px 20px;text-align:center;color:#565d68;font-size:13px;line-height:1.7}

/* ── CHAT THREAD (flex:1 right pane) ── */
.msgs-right{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
.msgs-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#565d68}
.msgs-placeholder-icon{opacity:.25}
.msgs-placeholder-text{font-size:14px}
.msgs-thread{flex:1;display:flex;flex-direction:column;min-height:0}

/* thread header */
.msgs-thread-hdr{padding:14px 20px;border-bottom:1px solid #16191f;display:flex;align-items:center;gap:12px;flex-shrink:0;background:#0a0b0e}
.msgs-back{display:none;align-items:center;gap:5px;background:transparent;border:none;color:#8a919c;font-size:14px;cursor:pointer;padding:0 8px 0 0;font-family:'Geist',system-ui,sans-serif;transition:color .15s;flex-shrink:0}
.msgs-back:hover{color:#eef1f5}
.msgs-thread-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.msgs-thread-meta{flex:1;min-width:0}
.msgs-thread-name{font-size:14px;font-weight:700;color:#eef1f5}
.msgs-thread-status{font-size:11px;color:#565d68;margin-top:2px;display:flex;align-items:center;gap:5px;min-width:0}
.msgs-thread-status.online{color:#3ad29b}
.msgs-status-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.msgs-online-dot{width:6px;height:6px;border-radius:50%;background:#3ad29b;flex-shrink:0}
.msgs-copy-trades-btn{background:rgba(247,185,85,.1);border:1px solid rgba(247,185,85,.25);border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;color:#f7b955;cursor:pointer;font-family:'Geist',system-ui,sans-serif;transition:background .15s;white-space:nowrap;flex-shrink:0}
.msgs-copy-trades-btn:hover{background:rgba(247,185,85,.18)}
.msgs-copy-trades-btn.active{background:rgba(58,210,155,.14);border-color:rgba(58,210,155,.35);color:#3ad29b}
.msgs-more-wrap{position:relative;flex-shrink:0}
.msgs-more-btn{background:none;border:1px solid #21252c;border-radius:9px;width:32px;height:32px;color:#8a919c;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:border-color .15s,color .15s}
.msgs-more-btn:hover{border-color:#f7b955;color:#f7b955}
.msgs-more-menu{display:none;position:absolute;top:38px;right:0;background:#101216;border:1px solid #21252c;border-radius:10px;padding:4px;min-width:150px;z-index:25}
.msgs-more-menu.open{display:block}
.msgs-more-menu a,.msgs-more-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:#eef1f5;font-size:13px;padding:8px 10px;border-radius:7px;cursor:pointer;text-decoration:none;font-family:inherit}
.msgs-more-menu a:hover,.msgs-more-menu button:hover{background:#16191f}

/* messages area */
.msgs-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;min-height:0}
.msgs-day-divider{text-align:center;color:#565d68;font-size:11px;font-weight:600;letter-spacing:.04em;margin:6px 0 2px}
.msg-wrap{display:flex;flex-direction:column}
.msg-wrap.mine{align-items:flex-end}
.msg-wrap.theirs{align-items:flex-start}
.msg-bubble{padding:10px 15px;max-width:min(420px,72vw);word-break:break-word;font-size:14px;line-height:1.5}
.msg-wrap.mine   .msg-bubble{background:#f7b955;color:#0a0b0e;border-radius:18px 18px 4px 18px;font-weight:500}
.msg-wrap.theirs .msg-bubble{background:#101216;color:#eef1f5;border:1px solid #16191f;border-radius:18px 18px 18px 4px}
.msg-time{font-size:11px;color:#565d68;margin-top:3px;padding:0 2px}
.msg-wrap.mine{position:relative}
.msg-bubble-wrap{position:relative;display:inline-block;max-width:100%}
.msg-menu-btn{display:none;position:absolute;top:-2px;left:-28px;background:none;border:none;color:#565d68;cursor:pointer;font-size:16px;padding:4px}
.msg-wrap.mine:hover .msg-menu-btn{display:block}
.msg-menu{display:none;position:absolute;top:20px;left:-90px;background:#101216;border:1px solid #21252c;border-radius:10px;padding:4px;min-width:110px;z-index:15}
.msg-menu.open{display:block}
.msg-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:#eef1f5;font-size:13px;padding:7px 10px;border-radius:7px;cursor:pointer}
.msg-menu button:hover{background:#16191f}
.msg-menu button.danger{color:#ff4d6a}
.msg-edited-tag{color:#565d68;font-size:10px;margin-left:4px}
.msg-seen-tag{color:#f7b955;font-size:10px}
.msg-edit-input{background:#0a0b0e;border:1px solid #f7b955;border-radius:12px;padding:8px 12px;font-size:14px;color:#eef1f5;width:200px;font-family:inherit}
.msg-edit-actions{display:flex;gap:8px;margin-top:6px}
.msg-edit-actions button{background:none;border:none;color:#f7b955;font-size:12px;cursor:pointer;padding:2px 6px}
.msg-bubble.msg-image{padding:0;background:none!important;border:none!important;max-width:220px;line-height:0}
.msg-bubble.msg-image img{display:block;width:100%;border-radius:14px;cursor:pointer}
.msg-bubble.msg-pending{opacity:.6}
.msgs-attach-btn{background:none;border:1px solid #21252c;border-radius:11px;width:44px;height:44px;flex-shrink:0;color:#8a919c;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s}
.msgs-attach-btn:hover{border-color:#f7b955;color:#f7b955}
.msgs-trade-wrap{position:relative}
.msgs-trade-panel{display:none;position:absolute;bottom:52px;left:0;width:260px;max-height:280px;overflow-y:auto;background:#101216;border:1px solid #21252c;border-radius:13px;padding:6px;z-index:20}
.msgs-trade-panel.open{display:block}
.msgs-trade-panel-empty{padding:14px 10px;font-size:12px;color:#565d68;text-align:center}
.msgs-trade-opt{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:inherit}
.msgs-trade-opt:hover{background:#16191f}
.msgs-trade-opt-tok{font-size:13px;font-weight:600;color:#eef1f5}
.msgs-trade-opt-pnl{font-size:12px;font-weight:700}
.msg-bubble.msg-trade{padding:12px 14px;background:#101216;border:1px solid #21252c;border-radius:14px;min-width:180px}
.msg-trade-tok{font-size:13px;font-weight:700;color:#f7b955;margin-bottom:6px}
.msg-trade-prices{font-size:12px;color:#8a919c;margin-bottom:4px}
.msg-trade-pnl{font-size:15px;font-weight:700}
.msgs-emoji-wrap{position:relative}
.msgs-emoji-btn{background:none;border:1px solid #21252c;border-radius:11px;width:44px;height:44px;flex-shrink:0;font-size:18px;cursor:pointer}
.msgs-emoji-btn:hover{border-color:#f7b955}
.msgs-emoji-panel{display:none;position:absolute;bottom:52px;left:0;width:260px;max-height:220px;overflow-y:auto;background:#101216;border:1px solid #21252c;border-radius:13px;padding:8px;grid-template-columns:repeat(7,1fr);gap:2px;z-index:20}
.msgs-emoji-panel.open{display:grid}
.msgs-emoji-panel button{background:none;border:none;font-size:19px;padding:6px 0;border-radius:8px;cursor:pointer}
.msgs-emoji-panel button:hover{background:#16191f}
.msgs-area-empty{text-align:center;color:#565d68;font-size:13px;padding:40px 0;margin:auto}

/* composer */
.msgs-input-bar{border-top:1px solid #16191f;padding:12px 16px;display:flex;gap:10px;flex-shrink:0;background:#0a0b0e}
.msgs-input{flex:1;min-width:0;background:#101216;border:1px solid #21252c;border-radius:13px;padding:11px 15px;color:#eef1f5;font-size:14px;font-family:'Geist',system-ui,sans-serif;outline:none;transition:border-color .15s}
.msgs-input::placeholder{color:#565d68}
.msgs-input:focus{border-color:rgba(247,185,85,.4)}
.msgs-send{background:#f7b955;color:#0a0b0e;border:none;border-radius:50%;width:44px;height:44px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Geist',system-ui,sans-serif;transition:opacity .15s;flex-shrink:0}
.msgs-send:hover{opacity:.88}
.msgs-send:disabled{opacity:.4;cursor:not-allowed}
.msgs-send svg{margin-left:-1px}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#21252c;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#2d333c}
*{scrollbar-width:thin;scrollbar-color:#21252c transparent}

/* ── TABLET (768–1024px): hide sidebar ── */
@media(max-width:1024px) and (min-width:768px){
  #sidebar{display:none!important}
}

/* ── MOBILE (<768px): single-pane ── */
@media(max-width:767px){
  html,body{height:auto!important;overflow:auto!important}
  #app{display:block!important;height:auto!important;overflow:visible!important}
  #sidebar{display:none!important}
  .msgs-main{display:block;height:auto}

  /* list pane: full width, natural scroll */
  .msgs-left{width:100%;min-width:0;border-right:none;height:auto;max-height:none}
  .conv-list{overflow-y:visible;height:auto;max-height:none}

  /* thread pane hidden by default; opens as fullscreen overlay */
  .msgs-right{display:none}
  .msgs-main.thread-open .msgs-left{display:none}
  .msgs-main.thread-open .msgs-right{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;height:100vh;height:100dvh;z-index:100;background:#0a0b0e;overflow:hidden}
  .msgs-thread{flex:1;min-height:0;display:flex;flex-direction:column}
  .msgs-area{flex:1;overflow-y:auto;min-height:0}
  .msgs-back{display:flex}
  .msgs-input-bar{flex-shrink:0;position:sticky;bottom:0;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))}

  /* thread header: tighter gap, Copy Trades becomes icon-only so it fits next to the name/status */
  .msgs-thread-hdr{gap:8px;padding:12px 14px}
  .msgs-thread-name{font-size:13px}
  .msgs-copy-trades-label{display:none}
  .msgs-copy-trades-btn{padding:0;width:40px;height:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

  /* list header: proper 52px sticky top bar */
  .msgs-left-hdr{position:sticky;top:0;z-index:10;background:#101216;border-bottom:1px solid #16191f;padding:0 16px;height:52px;display:flex;align-items:center;gap:0}
  .msgs-left-title-row{width:100%;margin-bottom:0}
  .msgs-left-title{font-size:16px;font-weight:600;color:#eef1f5;margin-right:auto}

<script>
var _myWallet      = {{ wallet|tojson }};
var _csrfToken     = {{ csrf_token|tojson }};
var _myUserId      = null;
var _activePeerId  = null;
var _activePeer    = {};      /* {id, wallet, username} */
var _pollTimer     = null;
var _conversations = [];

/* ── HELPERS ── */
function _avatarColor(s) {
  var p = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6','#f97316','#a855f7'];
  var h = 0;
  for (var i = 0; i < (s||'').length; i++) h = (h * 31 + (s.charCodeAt(i)|0)) | 0;
  return p[Math.abs(h) % p.length];
}

function _timeAgo(ts) {
  if (!ts) return '';
  var s = typeof ts === 'string' && ts.indexOf('T') < 0 ? ts.replace(' ', 'T') + 'Z' : ts;
  var sec = Math.floor((Date.now() - new Date(s).getTime()) / 1000);
  if (isNaN(sec) || sec < 5) return 'now';
  if (sec < 60)    return sec + 's';
  if (sec < 3600)  return Math.floor(sec / 60) + 'm';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h';
  return Math.floor(sec / 86400) + 'd';
}

function _dayKey(ts) {
  if (!ts) return '';
  var s = typeof ts === 'string' && ts.indexOf('T') < 0 ? ts.replace(' ', 'T') + 'Z' : ts;
  var d = new Date(s);
  if (isNaN(d.getTime())) return '';
  return d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
}
function _dayLabel(ts) {
  var s = typeof ts === 'string' && ts.indexOf('T') < 0 ? ts.replace(' ', 'T') + 'Z' : ts;
  var d = new Date(s);
  if (isNaN(d.getTime())) return '';
  var now = new Date();
  var startOf = function(x){ return new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime(); };
  var diffDays = Math.round((startOf(now) - startOf(d)) / 86400000);
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', diffDays > 330 ? {month:'short', day:'numeric', year:'numeric'} : {month:'short', day:'numeric'});
}

function _short(w) {
  return w ? (w.slice(0, 4) + '…' + w.slice(-4)) : '';
}

function _esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _scrollToBottom() {
  var area = document.getElementById('msgs-area');
  if (area) area.scrollTop = area.scrollHeight;
}

/* ── CONVERSATIONS ── */
async function loadConversations() {
  try {
    var r = await fetch('/api/messages');
    var d = await r.json();
    if (d.ok) {
      _conversations = d.conversations || [];
      _renderConvList();
      var total = _conversations.reduce(function(n,c){ return n + (c.unread||0); }, 0);
      var badge = document.getElementById('sb-msg-badge');
      if (badge) { badge.textContent = total || ''; badge.style.display = total ? '' : 'none'; }
    } else {
      document.getElementById('conv-list').innerHTML = '<div class="msgs-left-empty">Failed to load.</div>';
    }
  } catch(e) {
    document.getElementById('conv-list').innerHTML = '<div class="msgs-left-empty">Could not connect.</div>';
  }
}

function _filterConvs(q) {
  var rows = document.querySelectorAll('#conv-list .conv-row-wrap');
  rows.forEach(function(row) {
    var text = row.textContent.toLowerCase();
    row.style.display = (!q || text.indexOf(q.toLowerCase()) >= 0) ? '' : 'none';
  });
}

function _showAvatarLightbox(url){
  var lb = document.getElementById('avatar-lightbox');
  var img = document.getElementById('avatar-lightbox-img');
  if(!lb || !img) return;
  img.src = url;
  lb.classList.add('open');
}
function _closeAvatarLightbox(){
  var lb = document.getElementById('avatar-lightbox');
  if(lb) lb.classList.remove('open');
}

function _showImgLightbox(url){
  var lb = document.getElementById('img-lightbox');
  var img = document.getElementById('img-lightbox-img');
  if(!lb || !img) return;
  img.src = url;
  lb.classList.add('open');
}
function _closeImgLightbox(){
  var lb = document.getElementById('img-lightbox');
  if(lb) lb.classList.remove('open');
}
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') _closeImgLightbox();
});

function _renderConvList() {
  var el = document.getElementById('conv-list');
  if (!_conversations.length) {
    el.innerHTML = '<div class="msgs-left-empty">No conversations yet.<br>Press <strong style="color:#f7b955">+ New</strong> to start one.</div>';
    return;
  }
  el.innerHTML = _conversations.map(function(c) {
    var name   = c.peer_username || _short(c.peer_wallet || '');
    var color  = _avatarColor(c.peer_wallet || String(c.peer_id));
    var ini    = (name[0] || '?').toUpperCase();
    var active = c.peer_id === _activePeerId ? ' active' : '';
    var unread = c.unread > 0;
    var badge  = unread ? '<span class="conv-badge">'+c.unread+'</span>' : '';
    var avatarImg = c.peer_avatar
      ? '<img src="'+_esc(c.peer_avatar)+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display=\'none\'">'
      : '';
    var previewRaw = c.last_type === 'image' ? '📷 Photo'
      : c.last_type === 'trade' ? '📊 Shared a trade'
      : (c.last_msg || '');
    var preview = (c.last_is_mine ? 'you: ' : '') + previewRaw.slice(0, 60);
    return '<div class="conv-row-wrap" data-peer-id="'+c.peer_id+'">'
      + '<div class="conv-row'+active+'">'
      +   '<div class="conv-avatar" style="background:'+color+';position:relative;overflow:hidden'+(c.peer_avatar?';cursor:pointer':'')+'"'+(c.peer_avatar?' onclick="event.stopPropagation();_showAvatarLightbox('+_esc(JSON.stringify(c.peer_avatar))+')"':'')+'>'+_esc(ini)+avatarImg
      +     (c.peer_online ? '<span class="msgs-online-dot" style="position:absolute;bottom:1px;right:1px;border:2px solid #0a0b0e"></span>' : '')
      +   '</div>'
      +   '<div class="conv-info">'
      +     '<div class="conv-name">'+_esc(name)+(c.peer_verified ? ' <svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;margin-left:2px"><circle cx="12" cy="12" r="12" fill="#f7b955"/><path d="M7 12.5l3.2 3.2L17 9" stroke="#0a0b0e" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '')+'</div>'
      +     '<div class="conv-preview'+(unread?' unread':'')+'">'+_esc(preview)+'</div>'
      +   '</div>'
      +   '<div class="conv-meta">'
      +     '<span class="conv-time">'+_esc(_timeAgo(c.last_ts))+'</span>'
      +     badge
      +   '</div>'
      + '</div>'
      + '<button class="conv-delete-btn">Delete</button>'
      + '</div>';
  }).join('');
  el.querySelectorAll('.conv-row-wrap').forEach(function(wrap){
    var peerId = parseInt(wrap.dataset.peerId, 10);
    var content = wrap.querySelector('.conv-row');
    var delBtn = wrap.querySelector('.conv-delete-btn');
    _attachSwipeToDelete(wrap, content, delBtn, {
      onOpen: function(){
        var c = _conversations.find(function(x){ return x.peer_id === peerId; });
        _openThread(peerId, c ? c.peer_username : '', c ? c.peer_wallet : '');
      },
      onDelete: function(){ _deleteConversation(peerId, wrap); }
    });
  });
}

// ── SWIPE-TO-DELETE (touch-only; vanilla touchstart/touchmove/touchend, no
// library) — same approach as the embedded dashboard DM panel: touchmove is
// {passive:false} so preventDefault() can suppress page scroll, but only once
// the gesture is confirmed horizontal. A plain tap falls through to onOpen. ──
var _convSwipeOpenWrap = null;
function _attachSwipeToDelete(wrapEl, contentEl, deleteBtnEl, opts) {
  var ACTION_WIDTH = 84;
  var startX = 0, startY = 0, startTranslate = 0, dragging = false, horizontal = null, moved = false;

  function curTranslate() {
    var m = /translateX\((-?\d+(?:\.\d+)?)px\)/.exec(contentEl.style.transform);
    return m ? parseFloat(m[1]) : 0;
  }
  function setTranslate(x, animate) {
    contentEl.style.transition = animate ? 'transform .2s ease' : 'none';
    contentEl.style.transform = 'translateX(' + x + 'px)';
  }
  function closeRow(animate) {
    setTranslate(0, animate !== false);
    wrapEl.dataset.swipeOpen = '0';
    if (_convSwipeOpenWrap === wrapEl) _convSwipeOpenWrap = null;
  }
  function openRow() {
    if (_convSwipeOpenWrap && _convSwipeOpenWrap !== wrapEl) {
      var otherContent = _convSwipeOpenWrap.querySelector('.conv-row');
      if (otherContent) { otherContent.style.transition = 'transform .2s ease'; otherContent.style.transform = 'translateX(0)'; }
      _convSwipeOpenWrap.dataset.swipeOpen = '0';
    }
    setTranslate(-ACTION_WIDTH, true);
    wrapEl.dataset.swipeOpen = '1';
    _convSwipeOpenWrap = wrapEl;
  }

  wrapEl.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTranslate = curTranslate();
    dragging = true; horizontal = null; moved = false;
  }, {passive: true});

  wrapEl.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
    if (horizontal === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) horizontal = Math.abs(dx) > Math.abs(dy);
    if (horizontal) {
      e.preventDefault();
      moved = true;
      setTranslate(Math.max(-ACTION_WIDTH, Math.min(0, startTranslate + dx)), false);
    }
  }, {passive: false});

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    if (horizontal && moved) {
      if (curTranslate() < -ACTION_WIDTH * 0.35) openRow(); else closeRow();
    }
    horizontal = null; moved = false;
  }
  wrapEl.addEventListener('touchend', endDrag, {passive: true});
  wrapEl.addEventListener('touchcancel', endDrag, {passive: true});

  contentEl.addEventListener('click', function() {
    if (wrapEl.dataset.swipeOpen === '1') { closeRow(); return; }
    if (opts.onOpen) opts.onOpen();
  });
  deleteBtnEl.addEventListener('click', function(ev) {
    ev.stopPropagation();
    if (opts.onDelete) opts.onDelete();
  });
}

async function _deleteConversation(peerId, wrapEl) {

}

var _lastMsgsSig = null;

function _renderMessages(msgs, forceScroll) {
  var area = document.getElementById('msgs-area');
  if (!area) return;
  // Skip the (expensive, flicker-causing) full re-render on the 5s poll when
  // nothing actually changed — this was rebuilding the whole DOM every cycle
  // regardless, which is what made the thread feel like it stutters.
  var sig = msgs.length + '|' + msgs.map(function(m){ return m.id+':'+(m.edited_at||'')+':'+(m.is_read?1:0); }).join(',');
  if (sig === _lastMsgsSig && !forceScroll) return;
  _lastMsgsSig = sig;
  var atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  if (!msgs.length) {
    area.innerHTML = '<div class="msgs-area-empty">No messages yet. Say hello!</div>';
    return;
  }
  var lastDayKey = null;
  area.innerHTML = msgs.map(function(m) {
    var dayKey = _dayKey(m.created_at);
    var divider = '';
    if (dayKey && dayKey !== lastDayKey) {
      divider = '<div class="msgs-day-divider">'+_esc(_dayLabel(m.created_at))+'</div>';
      lastDayKey = dayKey;
    }
    var mine = _myUserId != null ? (m.sender_id === _myUserId) : false;
    var bubble;
    if (m.message_type === 'image') {
      bubble = '<div class="msg-bubble msg-image"><img src="'+_esc(m.message)+'" loading="lazy" onclick="_showImgLightbox('+_esc(JSON.stringify(m.message))+')"></div>';
    } else if (m.message_type === 'trade') {
      var tr = {}; try { tr = JSON.parse(m.message); } catch(e) {}
      var trPnl = tr.pnl || 0, trPos = trPnl >= 0;
      bubble = '<div class="msg-bubble msg-trade">'
        + '<div class="msg-trade-tok">' + _esc(tr.token || '?') + '</div>'
        + '<div class="msg-trade-prices">Entry $' + Number(tr.entry||0).toFixed(4) + ' → Exit $' + Number(tr.exit||0).toFixed(4) + '</div>'
        + '<div class="msg-trade-pnl" style="color:' + (trPos ? '#3ad29b' : '#f76b62') + '">' + (trPos?'+':'') + trPnl.toFixed(3) + ' SOL</div>'
        + '</div>';
    } else {
      bubble = '<div class="msg-bubble">'+_esc(m.message)+'</div>';
    }
    var menu = '';
    if (mine) {
      menu = '<button class="msg-menu-btn" onclick="_toggleMsgMenu(event,'+m.id+')">⋯</button>'
        + '<div class="msg-menu" id="msg-menu-'+m.id+'">'
        + (m.message_type === 'text' ? '<button onclick="_startEditMsg('+m.id+')">Edit</button>' : '')
        + '<button class="danger" onclick="_deleteMsg('+m.id+')">Delete</button></div>';
    }
    var editedTag = m.edited_at ? '<span class="msg-edited-tag">(edited)</span>' : '';
    var seenTag = (mine && m.is_read) ? '<span class="msg-seen-tag"> · Seen</span>' : '';
    return divider
      + '<div class="msg-wrap '+(mine?'mine':'theirs')+'" data-mid="'+m.id+'">'
      + '<div class="msg-bubble-wrap">'
      +   menu
      +   bubble
      + '</div>'
      + '<span class="msg-time">'+_esc(_timeAgo(m.created_at))+editedTag+seenTag+'</span>'
      + '</div>';
  }).join('');
  if (forceScroll || atBottom) _scrollToBottom();
  var conv = _conversations.find(function(c){ return c.peer_id === _activePeerId; });
  if (conv && conv.unread > 0) { conv.unread = 0; _renderConvList(); }
}

    var r = await fetch('/api/messages/' + id, {
      method:'PUT', headers:{'Content-Type':'application/json','X-CSRF-Token': _csrfToken},
      body: JSON.stringify({message: text})

async function _sendMessage() {
  var input = document.getElementById('msgs-input');
  var btn   = document.getElementById('msgs-send');
  if (!input || !_activePeerId) return;
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  btn.disabled = true;
  try {
    var r = await fetch('/api/messages/' + _activePeerId, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRF-Token': _csrfToken},
      body: JSON.stringify({message: text})
    });
    var d = await r.json();
    if (d.ok) {
      await loadThread(_activePeerId, true);
      var conv = _conversations.find(function(c){ return c.peer_id === _activePeerId; });
      if (conv) { conv.last_msg = text; conv.last_ts = d.created_at; conv.last_type = 'text'; conv.last_is_mine = true; }
      else { _conversations.unshift({peer_id:_activePeerId, peer_wallet:_activePeer.wallet, peer_username:_activePeer.username, last_msg:text, last_ts:d.created_at, last_type:'text', last_is_mine:true, unread:0}); }
      _renderConvList();
    } else {
      input.value = text;
    }
  } catch(e) {
    input.value = text;
    console.error('[messages] send error', e);
  }
  btn.disabled = false;
  input.focus();
}

async function _uploadAndSendImage(file) {
  var allowed = ['image/jpeg','image/png','image/gif','image/webp'];
  if (allowed.indexOf(file.type) === -1) { alert('Only jpg, png, gif or webp images are supported.'); return; }
  if (file.size > 5 * 1024 * 1024) { alert('Image must be smaller than 5 MB.'); return; }
  if (!_activePeerId) return;

  var area = document.getElementById('msgs-area');
  var empty = area && area.querySelector('.msgs-area-empty');
  if (empty) empty.remove();

  var localUrl = URL.createObjectURL(file);
  var pendingId = '_img_pending_' + Date.now();
  var pending = document.createElement('div');
  pending.id = pendingId;
  pending.className = 'msg-wrap mine';
  pending.innerHTML = '<div class="msg-bubble msg-image msg-pending"><img src="'+localUrl+'"></div><span class="msg-time">Sending…</span>';
  if (area) { area.appendChild(pending); _scrollToBottom(); }

  try {
    var fd = new FormData();
    fd.append('image', file);
    var up = await fetch('/api/messages/upload-image', {
      method: 'POST',
      headers: {'X-CSRF-Token': _csrfToken},
      body: fd
    });
    var ud = await up.json();
    if (!ud.ok) throw new Error(ud.msg || 'Upload failed');

    var r = await fetch('/api/messages/' + _activePeerId, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRF-Token': _csrfToken},
      body: JSON.stringify({message: ud.url, message_type: 'image'})
    });
    var rd = await r.json();
    var p = document.getElementById(pendingId);
    if (p) p.remove();
    URL.revokeObjectURL(localUrl);
    await loadThread(_activePeerId, true);
    var conv = _conversations.find(function(c){ return c.peer_id === _activePeerId; });
    if (conv) { conv.last_msg = ud.url; conv.last_ts = rd.created_at; conv.last_type = 'image'; conv.last_is_mine = true; }
    else { _conversations.unshift({peer_id:_activePeerId, peer_wallet:_activePeer.wallet, peer_username:_activePeer.username, last_msg:ud.url, last_ts:rd.created_at, last_type:'image', last_is_mine:true, unread:0}); }
    _renderConvList();
  } catch(e) {
    var p = document.getElementById(pendingId);
    if (p) p.remove();
    URL.revokeObjectURL(localUrl);
    alert('Failed to send image: ' + e.message);
  }
}

  try {
    var me = await fetch('/api/me').then(function(r){ return r.json(); });
    if (me.ok) {
      _myUserId = me.user_id;
      var ini    = document.getElementById('sb-avatar-ini');
      var name   = document.getElementById('sb-user-name');
      var handle = document.getElementById('sb-handle');
      var sol    = document.getElementById('sb-sol');
      if (ini)    ini.textContent    = (me.username || me.wallet || '?')[0].toUpperCase();
      if (name)   name.textContent   = me.username || _short(me.wallet);
      if (handle) handle.textContent = me.username ? '@' + me.username : _short(me.wallet);
      if (sol && me.balance != null) sol.textContent = parseFloat(me.balance).toFixed(3);
      if (me.avatar) {
        var img = document.getElementById('sb-avatar-img');
        if (img) { img.src = me.avatar; img.style.display = ''; }
      }
    }
  } catch(e) {}
  await loadConversations();
  {% if open_peer_id %}
  _openThread({{ open_peer_id }});
  {% endif %}
}

_init();
fetch('/api/heartbeat', {method:'POST', headers:{'X-CSRF-Token': _csrfToken}}).catch(function(){});
setInterval(function(){
  fetch('/api/heartbeat', {method:'POST', headers:{'X-CSRF-Token': _csrfToken}}).catch(function(){});
}, 45000);
</script>
