<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connecting wallet… — OrcAgent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b0e;color:#eef1f5;font-family:'Geist',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;padding:20px;text-align:center}
.spin{font-size:36px;animation:spin 1s linear infinite;display:inline-block;color:#3ad29b}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:14px;color:#8a919c;max-width:300px;line-height:1.5}
.err{color:#f76b62}
.brand{font-size:11px;color:#565d68;margin-top:20px;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<div class="spin">◌</div>
<div class="msg" id="msg">Completing wallet connection…</div>
<div class="brand">OrcAgent</div>

<script>
(function(){
  var msg=document.getElementById('msg');
  function fail(txt){
    msg.className='msg err';
    msg.textContent=txt;
    setTimeout(function(){window.location.href='/';},5000);
  }

  var p=new URLSearchParams(window.location.search);
  console.log('[phantom-cb] full URL:', window.location.href);
  p.forEach(function(v,k){
    console.log('[phantom-cb] param', k, '=', (k==='data'||k==='nonce')?v.slice(0,20)+'…':v);
  });

  var errCode=p.get('errorCode');
  if(errCode){
    fail('Phantom rejected the connection — '+(p.get('errorMessage')||'')+' ('+errCode+')');
    return;
  }

  var token       = p.get('token');
  var phantomPk   = p.get('phantom_encryption_public_key');
  var nonce       = p.get('nonce');
  var data        = p.get('data');

  console.log('[phantom-cb] token:', token ? token.slice(0,8)+'…' : 'MISSING');
  console.log('[phantom-cb] phantom_pk:', !!phantomPk);
  console.log('[phantom-cb] nonce:', !!nonce);
  console.log('[phantom-cb] data:', !!data);

  if(!token)  { fail('Session token missing — please try connecting again.'); return; }
  if(!phantomPk||!nonce||!data){ fail('Incomplete callback — missing Phantom params. Please try again.'); return; }

  msg.textContent='Decrypting wallet response…';

  fetch('/api/phantom/decrypt',{
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:token, phantom_pk:phantomPk, nonce:nonce, data:data})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    console.log('[phantom-cb] decrypt response:', d);
    if(!d.ok||!d.wallet_address){
      fail('Decrypt failed: '+(d.error||'unknown error'));
      return;
    }
    msg.textContent='Connected! Redirecting…';
    window.location.href='/';
  })
  .catch(function(e){
    console.error('[phantom-cb] fetch error:', e);
    fail('Network error: '+e.message);
  });
})();
</script>
</body>
</html>
