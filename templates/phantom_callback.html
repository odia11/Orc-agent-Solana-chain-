<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connecting wallet… — OrcAgent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b0e;color:#eef1f5;font-family:'Geist',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;padding:20px;text-align:center}
.spin{font-size:36px;animation:spin 1s linear infinite;display:inline-block;color:#3ad29b}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:14px;color:#8a919c;max-width:300px;line-height:1.5}
.err{color:#f76b62}
.brand{font-size:11px;color:#565d68;margin-top:20px;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<div class="spin">◌</div>
<div class="msg" id="msg">Completing wallet connection…</div>
<div class="brand">OrcAgent</div>

<script>
var _b58enc=(function(){
  var A='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
  return function(buf){
    var d=[],s='';
    for(var i=0;i<buf.length;i++){
      var c=buf[i];
      for(var j=0;j<d.length;j++){c+=d[j]<<8;d[j]=c%58;c=c/58|0;}
      while(c>0){d.push(c%58);c=c/58|0;}
    }
    for(var k=0;buf[k]===0&&k<buf.length-1;k++) s+='1';
    return s+d.reverse().map(function(x){return A[x];}).join('');
  };
})();

(async function(){
  var msg = document.getElementById('msg');

  function fail(txt){
    msg.className = 'msg err';
    msg.textContent = txt;
    setTimeout(function(){ window.location.href = '/'; }, 5000);
  }

  var p = new URLSearchParams(window.location.search);
  console.log('[phantom-cb] URL:', window.location.href);
  p.forEach(function(v,k){
    console.log('[phantom-cb]', k, '=', (k==='data'||k==='nonce') ? v.slice(0,20)+'…' : v);
  });

  var errCode = p.get('errorCode');
  if(errCode){
    fail('Phantom rejected — '+(p.get('errorMessage')||'')+' ('+errCode+')');
    return;
  }

  // ── STEP: sign ── signMessage callback → decrypt signature → wallet/set ──────
  if(p.get('step') === 'sign'){
    var token     = p.get('token');
    var phantomPk = p.get('phantom_encryption_public_key');
    var nonce     = p.get('nonce');
    var data      = p.get('data');

    console.log('[phantom-cb] sign step — token:', token ? token.slice(0,8)+'…' : 'MISSING');

    // Retrieve wallet address and auth nonce stored before signMessage redirect
    var walletAddress = null, authNonce = null;
    try{
      walletAddress = sessionStorage.getItem('_orca_phantom_wallet');
      authNonce     = sessionStorage.getItem('_orca_phantom_nonce');
      sessionStorage.removeItem('_orca_phantom_wallet');
      sessionStorage.removeItem('_orca_phantom_nonce');
    }catch(e){}

    if(!walletAddress || !authNonce){ fail('Session data lost — please reconnect.'); return; }
    if(!token || !phantomPk || !nonce || !data){ fail('Incomplete sign callback — please try again.'); return; }

    // Decrypt signature from Phantom's encrypted response
    msg.textContent = 'Verifying signature…';
    var sigR = await fetch('/api/phantom/decrypt-signature',{
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token:token, phantom_pk:phantomPk, nonce:nonce, data:data})
    }).then(function(r){ return r.json(); }).catch(function(){ return null; });

    if(!sigR || !sigR.ok || !sigR.signature){
      fail('Signature decryption failed: '+((sigR && sigR.error) || 'unknown'));
      return;
    }
    console.log('[phantom-cb] sig='+sigR.signature.slice(0,12)+'…');

    // Authenticate: wallet/set with address + nonce + signature proof
    msg.textContent = 'Completing sign-in…';
    var wr = await fetch('/api/wallet/set',{
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({address:walletAddress, nonce:authNonce, signature:sigR.signature})
    }).then(function(r){ return r.json(); }).catch(function(){ return null; });

    if(wr && (wr.ok || wr.success)){
      msg.textContent = 'Connected! Redirecting…';
      window.location.href = '/';
    } else {
      fail('Auth failed: '+((wr && wr.msg) || 'unknown'));
    }
    return;
  }

  // ── DEFAULT: connect callback → decrypt wallet address → redirect ─────────────
  var token     = p.get('token');
  var phantomPk = p.get('phantom_encryption_public_key');
  var nonce     = p.get('nonce');
  var data      = p.get('data');

  console.log('[phantom-cb] connect step — token:', token ? token.slice(0,8)+'…' : 'MISSING');

  if(!token)                    { fail('Session token missing — please try again.'); return; }
  if(!phantomPk || !nonce || !data){ fail('Incomplete callback — please try again.'); return; }

  msg.textContent = 'Decrypting wallet response…';
  var dr = await fetch('/api/phantom/decrypt',{
    method: 'POST', credentials: 'include',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({token:token, phantom_pk:phantomPk, nonce:nonce, data:data})
  }).then(function(r){ return r.json(); }).catch(function(){ return null; });

  console.log('[phantom-cb] decrypt response:', dr);
  if(!dr || !dr.ok || !dr.wallet_address){
    fail('Decrypt failed: '+((dr && dr.error) || 'unknown error'));
    return;
  }

  msg.textContent = 'Connected! Redirecting…';
  setTimeout(function(){ window.location.href = '/'; }, 300);
})();
</script>
</body>
</html>
