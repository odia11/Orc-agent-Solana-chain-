<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wallet — OrcAgent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0e;
  --card:#101216;
  --border:#21252c;
  --divider:#16191f;
  --accent:#35d4c4;
  --green:#00d084;
  --red:#ff4757;
  --text:#eef1f5;
  --muted:#565d68;
  --sub:#8a919c;
  --mono:'JetBrains Mono',monospace;
  --ui:'Geist',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh;padding-bottom:48px}

/* ── header ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(10,11,14,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--divider);
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;gap:12px;
}
.hdr-left{display:flex;flex-direction:column;gap:2px}
.hdr-title{font-size:16px;font-weight:600;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-back{font-size:13px;color:var(--muted);text-decoration:none}
.hdr-back:hover{color:var(--text)}
.net-pill{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;
  color:var(--accent);border:1px solid var(--accent);border-radius:20px;
  padding:4px 11px;white-space:nowrap;
}
.net-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* ── layout ── */
.page{max-width:600px;margin:0 auto;padding:20px 16px 0;display:flex;flex-direction:column;gap:14px}

/* ── hero card ── */
.hero{
  background:linear-gradient(160deg,#11151a 0%,#0e1013 100%);
  border:1px solid var(--border);border-radius:18px;padding:24px 22px 20px;
}
.hero-label{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);margin-bottom:12px}
.hero-bal-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.hero-bal-num{font-family:var(--mono);font-size:40px;font-weight:700;line-height:1;color:var(--text)}
.hero-bal-unit{font-family:var(--mono);font-size:17px;color:var(--muted);font-weight:400}
.hero-today{font-family:var(--mono);font-size:13px;font-weight:600;display:none}
.hero-usd{font-family:var(--mono);font-size:13px;color:var(--sub);margin-bottom:20px}

/* ── action buttons ── */
.actions{display:flex;gap:8px;margin-bottom:18px}
.act-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  border-radius:12px;padding:11px 4px;cursor:pointer;
  font-family:var(--ui);font-size:11px;font-weight:600;border:none;
  transition:opacity .15s;
}
.act-btn:hover{opacity:.82}
.act-primary{background:var(--accent);color:#06100f;border:1px solid var(--accent)}
.act-secondary{background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.act-secondary:hover{border-color:var(--accent);color:var(--text);opacity:1}
.act-icon{font-size:15px;line-height:1}

/* ── split cells ── */
.split{display:flex;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.split-cell{flex:1;padding:12px 14px;background:#0d0f12}
.split-cell+.split-cell{border-left:1px solid var(--border)}
.split-lbl{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.06em;margin-bottom:5px}
.split-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}

/* ── portfolio PnL bar ── */
.pnl-bar{
  margin-top:12px;padding:10px 14px;
  background:var(--divider);border:1px solid var(--border);border-radius:10px;
  font-family:var(--mono);font-size:12px;
  display:none;justify-content:space-between;align-items:center;
}

/* ── deposit card ── */
.dep-card{background:var(--card);border:1px solid var(--divider);border-radius:18px;padding:17px}
.dep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dep-title{font-size:13px;font-weight:600;color:var(--text)}
.dep-network{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.06em}
.dep-body{display:flex;gap:14px;align-items:flex-start}
.dep-qr{
  width:74px;height:74px;flex-shrink:0;
  background:var(--divider);border:1px solid var(--border);border-radius:10px;
  display:flex;align-items:center;justify-content:center;padding:8px;
}
.dep-qr-grid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:2px;width:100%;height:100%}
.dep-qr-cell{border-radius:1px}
.dep-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.dep-addr{
  font-family:var(--mono);font-size:11px;color:var(--sub);
  word-break:break-all;line-height:1.55;
  background:var(--divider);border:1px solid var(--border);border-radius:8px;padding:8px 10px;
}
.dep-btns{display:flex;gap:7px}
.dep-btn{
  flex:1;padding:7px 0;border-radius:8px;cursor:pointer;
  font-family:var(--ui);font-size:11px;font-weight:600;
  text-align:center;text-decoration:none;display:inline-block;border:none;
  transition:opacity .15s,border-color .15s,color .15s;
}
.dep-copy{background:var(--accent);color:#06100f}
.dep-copy:hover{opacity:.85}
.dep-scan{background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.dep-scan:hover{border-color:var(--accent);color:var(--accent)}

/* ── holdings card ── */
.holdings{background:var(--card);border:1px solid var(--divider);border-radius:18px;overflow:hidden}
.holdings-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 18px 13px;border-bottom:1px solid var(--divider);
}
.holdings-title{font-size:13px;font-weight:600;color:var(--text)}
.refresh-btn{
  background:none;border:1px solid var(--accent);color:var(--accent);
  border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;
  font-family:var(--ui);font-weight:500;transition:background .15s,color .15s;
}
.refresh-btn:hover{background:var(--accent);color:#000}

/* ── token row ── */
.tok-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;border-bottom:1px solid var(--divider);transition:background .12s;
}
.tok-row:last-child{border-bottom:none}
.tok-row:hover{background:var(--divider)}
.tok-logo{width:38px;height:38px;border-radius:50%;flex-shrink:0;object-fit:cover}
.tok-init{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ui);font-weight:700;font-size:12px;color:#fff;
}
.tok-info{flex:1;min-width:0;cursor:pointer}
.tok-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tok-amount{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.tok-val{text-align:right;flex-shrink:0;min-width:72px}
.tok-usd{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.tok-pct{font-family:var(--mono);font-size:11px;margin-top:2px}
.tok-trade{display:flex;align-items:center;gap:5px;flex-shrink:0}
.w-inp{
  width:68px;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:5px 8px;
  font-size:12px;font-family:var(--mono);outline:none;
}
.w-inp:focus{border-color:var(--accent)}
.w-buy-btn{
  background:#0a2a1a;color:var(--green);border:1px solid #00d08430;
  border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:var(--mono);white-space:nowrap;transition:background .15s,color .15s;
}
.w-buy-btn:hover{background:var(--green);color:#000}
.w-buy-btn:disabled{opacity:.4;cursor:not-allowed}
.w-sel{
  background:#1a0a0a;color:var(--red);border:1px solid #ff475730;
  border-radius:7px;padding:5px 7px;font-size:11px;font-family:var(--mono);cursor:pointer;outline:none;
}
.w-sell-btn{
  background:#1a0a0a;color:var(--red);border:1px solid #ff475730;
  border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:var(--mono);white-space:nowrap;transition:background .15s,color .15s;
}
.w-sell-btn:hover{background:var(--red);color:#fff}
.w-sell-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── states ── */
.state-msg{padding:28px 18px;color:var(--muted);font-size:13px;text-align:center}

/* ── shared modal ── */
.w-modal-back{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:500;align-items:center;justify-content:center;padding:20px;
}
.w-modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:18px;
  padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;
  position:relative;
}
.w-modal-close{
  position:absolute;top:14px;right:16px;background:none;border:none;
  color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0;
}
.w-modal-close:hover{color:var(--text)}
.w-modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px}
.w-modal-label{font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.04em}
.w-modal-inp{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:9px 12px;font-size:13px;font-family:var(--mono);outline:none;margin-bottom:12px;
}
.w-modal-inp:focus{border-color:var(--accent)}
.w-modal-addr{
  font-family:var(--mono);font-size:11px;color:var(--sub);word-break:break-all;
  line-height:1.55;background:var(--divider);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;margin-bottom:12px;
}
.w-modal-btns{display:flex;gap:8px;margin-top:4px}
.w-modal-btn{
  flex:1;padding:10px;border-radius:10px;cursor:pointer;font-family:var(--ui);
  font-size:12px;font-weight:600;text-align:center;text-decoration:none;
  display:inline-block;transition:opacity .15s,border-color .15s,color .15s;
}
.w-modal-primary{background:var(--accent);color:#06100f;border:1px solid var(--accent)}
.w-modal-primary:hover{opacity:.85}
.w-modal-secondary{background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.w-modal-secondary:hover{border-color:var(--accent);color:var(--text)}
.w-modal-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:10px}
.w-modal-qr{
  width:100%;aspect-ratio:1;max-width:160px;margin:0 auto 14px;
  display:grid;grid-template-columns:repeat(7,1fr);gap:2.5px;
}
.w-modal-qr-cell{border-radius:1.5px}

/* ── toast ── */
.w-toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:10px;font-size:13px;font-family:var(--mono);
  z-index:9999;white-space:nowrap;pointer-events:none;transition:opacity .25s;
}

/* ── mobile ── */
@media(max-width:480px){
  .hero-bal-num{font-size:32px}
  .tok-trade{display:none}
  .tok-val{min-width:60px}
  .actions{gap:6px}
  .act-btn{padding:9px 2px;font-size:10px}
  .dep-body{flex-direction:column}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">Wallet</div>
    <div class="hdr-sub">Your dedicated trading wallet</div>
  </div>
  <div class="hdr-right">
    <a href="/dashboard" class="hdr-back">← Back</a>
    <span class="net-pill"><span class="net-dot"></span>SOLANA · MAINNET</span>
  </div>
</header>

<div class="page">

  <!-- hero balance -->
  <div class="hero">
    <div class="hero-label">TOTAL BALANCE</div>
    <div class="hero-bal-row">
      <span class="hero-bal-num" id="sol">—</span>
      <span class="hero-bal-unit">SOL</span>
      <span class="hero-today" id="today-pct"></span>
    </div>
    <div class="hero-usd">≈ $<span id="usd">—</span> USD</div>

    <div class="actions">
      <button class="act-btn act-primary" onclick="_modalDeposit()">
        <span class="act-icon">↓</span>Deposit
      </button>
      <button class="act-btn act-secondary" onclick="_modalWithdraw()">
        <span class="act-icon">↑</span>Withdraw
      </button>
      <button class="act-btn act-secondary" onclick="_modalSend()">
        <span class="act-icon">→</span>Send
      </button>
      <button class="act-btn act-secondary" onclick="_modalSwap()">
        <span class="act-icon">⇄</span>Swap
      </button>
    </div>

    <div class="split">
      <div class="split-cell">
        <div class="split-lbl">AVAILABLE</div>
        <div class="split-val" id="avail">— SOL</div>
      </div>
      <div class="split-cell">
        <div class="split-lbl">IN POSITIONS</div>
        <div class="split-val" style="color:var(--accent)" id="inpos">0 SOL</div>
      </div>
    </div>

    <div class="pnl-bar" id="portfolio-pnl"></div>
  </div>

  <!-- deposit address card (always visible) -->
  <div class="dep-card">
    <div class="dep-header">
      <span class="dep-title">Deposit Address</span>
      <span class="dep-network">SPL · SOL</span>
    </div>
    <div class="dep-body">
      <div class="dep-qr"><div class="dep-qr-grid" id="dep-qr-sm"></div></div>
      <div class="dep-right">
        <div class="dep-addr">{{ wallet_address }}</div>
        <div class="dep-btns">
          <button class="dep-btn dep-copy" onclick="_copyAddr()">Copy Address</button>
          <a class="dep-btn dep-scan" href="https://solscan.io/account/{{ wallet_address }}" target="_blank" rel="noopener">Solscan ↗</a>
        </div>
      </div>
    </div>
  </div>

  <!-- holdings -->
  <div class="holdings">
    <div class="holdings-hdr">
      <span class="holdings-title">Holdings</span>
      <button class="refresh-btn" onclick="loadTokens(true)">↻ Refresh</button>
    </div>
    <div id="tokens"><div class="state-msg">Loading…</div></div>
  </div>

</div>

<!-- shared modal -->
<div class="w-modal-back" id="w-modal" onclick="if(event.target===this)_closeModal()">
  <div class="w-modal-box">
    <button class="w-modal-close" onclick="_closeModal()">✕</button>
    <div id="w-modal-body"></div>
  </div>
</div>

<script>
var _walletAddr = '{{ wallet_address }}'

// ── util ──────────────────────────────────────────────────
function _hash(str){
  var h=5381
  for(var i=0;i<str.length;i++) h=((h<<5)+h+str.charCodeAt(i))&0x7fffffff
  return h
}
function _symColor(sym){
  var h=_hash(sym||'?')
  return 'hsl('+(h%360)+',46%,33%)'
}
function _qrPattern(seed, size){
  // returns flat bool array, symmetric 5×5 or 7×7
  var bits=[]
  var half=Math.ceil(size/2)
  for(var r=0;r<size;r++){
    var row=[]
    for(var c=0;c<half;c++){seed=(seed*1664525+1013904223)&0x7fffffff;row.push((seed>>8)%3>0)}
    for(var c=half;c<size;c++) row.push(row[size-1-c])
    bits.push.apply(bits,row)
  }
  return bits
}

// ── small QR in dep-card ──────────────────────────────────
;(function(){
  var g=document.getElementById('dep-qr-sm')
  if(!g) return
  var bits=_qrPattern(_hash(_walletAddr),5)
  bits.forEach(function(on){
    var c=document.createElement('div')
    c.className='dep-qr-cell'
    c.style.background=on?'#35d4c4':'#1a1f26'
    g.appendChild(c)
  })
})()

// ── copy address ──────────────────────────────────────────
function _copyAddr(){
  if(!_walletAddr) return
  navigator.clipboard.writeText(_walletAddr).then(function(){
    _wToast('Address copied',true)
  }).catch(function(){
    var el=document.createElement('textarea')
    el.value=_walletAddr;el.style.cssText='position:fixed;opacity:0'
    document.body.appendChild(el);el.select()
    try{document.execCommand('copy');_wToast('Address copied',true)}
    catch(e){_wToast('Copy failed',false)}
    document.body.removeChild(el)
  })
}

// ── modals ────────────────────────────────────────────────
function _showModal(html){
  document.getElementById('w-modal-body').innerHTML=html
  document.getElementById('w-modal').style.display='flex'
}
function _closeModal(){
  document.getElementById('w-modal').style.display='none'
}

function _modalDeposit(){
  var addr=_walletAddr
  var bits=_qrPattern(_hash(addr),7)
  var cells=bits.map(function(on){
    return '<div class="w-modal-qr-cell" style="background:'+(on?'#35d4c4':'#16191f')+'"></div>'
  }).join('')
  _showModal(
    '<div class="w-modal-title">Receive SOL / Tokens</div>'
    +'<div class="w-modal-qr">'+cells+'</div>'
    +'<div class="w-modal-label">YOUR SOLANA ADDRESS</div>'
    +'<div class="w-modal-addr">'+addr+'</div>'
    +'<div class="w-modal-btns">'
      +'<button class="w-modal-btn w-modal-primary" onclick="_copyAddr()">Copy Address</button>'
      +'<a class="w-modal-btn w-modal-secondary" href="https://solscan.io/account/'+addr+'" target="_blank" rel="noopener">Solscan ↗</a>'
    +'</div>'
    +'<div class="w-modal-note">Only send SOL or SPL tokens on Solana mainnet to this address.</div>'
  )
}

function _modalWithdraw(){
  _showModal(
    '<div class="w-modal-title">Withdraw</div>'
    +'<div class="w-modal-label">YOUR WALLET ADDRESS</div>'
    +'<div class="w-modal-addr">'+_walletAddr+'</div>'
    +'<div class="w-modal-note">To withdraw funds, send SOL or tokens from this address using your connected Solana wallet (Phantom, Solflare, etc.).<br><br>Your private key controls this address — use your wallet app to initiate outgoing transfers.</div>'
    +'<div class="w-modal-btns" style="margin-top:14px">'
      +'<a class="w-modal-btn w-modal-secondary" href="https://phantom.app" target="_blank" rel="noopener">Phantom ↗</a>'
      +'<a class="w-modal-btn w-modal-secondary" href="https://solflare.com" target="_blank" rel="noopener">Solflare ↗</a>'
    +'</div>'
  )
}

function _modalSend(){
  _showModal(
    '<div class="w-modal-title">Send SOL</div>'
    +'<div class="w-modal-label">RECIPIENT ADDRESS</div>'
    +'<input class="w-modal-inp" id="send-to" placeholder="Solana wallet address…" maxlength="44">'
    +'<div class="w-modal-label">AMOUNT (SOL)</div>'
    +'<input class="w-modal-inp" id="send-amt" type="number" placeholder="0.00" min="0.000001" step="0.01">'
    +'<div class="w-modal-btns">'
      +'<button class="w-modal-btn w-modal-secondary" onclick="_closeModal()">Cancel</button>'
      +'<button class="w-modal-btn w-modal-primary" onclick="_execSend()">Send SOL</button>'
    +'</div>'
    +'<div class="w-modal-note" id="send-note"></div>'
  )
}

function _execSend(){
  var to=(document.getElementById('send-to')||{}).value||''
  var amt=parseFloat((document.getElementById('send-amt')||{}).value)||0
  var note=document.getElementById('send-note')
  if(!to||to.length<32){if(note)note.style.color='var(--red)',note.textContent='Enter a valid Solana address.';return}
  if(amt<=0){if(note)note.style.color='var(--red)',note.textContent='Enter an amount greater than 0.';return}
  if(note) note.style.color='var(--muted)',note.textContent='Processing…'
  fetch('/api/wallet/send',{
    method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({to:to,amount_sol:amt})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.ok||d.success){
      _closeModal()
      _wToast('Sent '+amt+' SOL',true)
      setTimeout(function(){loadBalance();loadTokens(true)},1500)
    } else {
      if(note) note.style.color='var(--red)',note.textContent=d.error||d.msg||'Send failed'
    }
  }).catch(function(){
    if(note) note.style.color='var(--red)',note.textContent='Network error'
  })
}

function _modalSwap(){
  _showModal(
    '<div class="w-modal-title">Swap</div>'
    +'<div class="w-modal-note" style="margin-bottom:14px">Swap tokens directly on Solana using Jupiter, the leading DEX aggregator.</div>'
    +'<div class="w-modal-btns">'
      +'<button class="w-modal-btn w-modal-secondary" onclick="_closeModal()">Cancel</button>'
      +'<a class="w-modal-btn w-modal-primary" href="https://jup.ag" target="_blank" rel="noopener">Open Jupiter ↗</a>'
    +'</div>'
  )
}

// ── toast ─────────────────────────────────────────────────
function _wToast(msg, ok){
  var t=document.createElement('div')
  t.className='w-toast'
  t.style.background=ok?'#0a2a1a':'#2a0a0a'
  t.style.color=ok?'#00d084':'#ff4757'
  t.style.border='1px solid '+(ok?'#00d084':'#ff4757')
  t.textContent=msg
  document.body.appendChild(t)
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},260)},3000)
}

// ── trade ─────────────────────────────────────────────────
function _wTrade(i, side){
  var tok=(window._wTokens||[])[i]
  if(!tok) return
  var buyBtn=document.getElementById('wbtn-'+i+'-buy')
  var sellBtn=document.getElementById('wbtn-'+i+'-sell')
  var origBuy=buyBtn?buyBtn.textContent:'BUY'
  var origSell=sellBtn?sellBtn.textContent:'SELL'
  if(buyBtn) buyBtn.disabled=true
  if(sellBtn) sellBtn.disabled=true
  if(side==='buy'&&buyBtn) buyBtn.textContent='…'
  if(side==='sell'&&sellBtn) sellBtn.textContent='…'

  var amount_sol=0
  if(side==='buy'){
    amount_sol=parseFloat((document.getElementById('winput-'+i)||{}).value)||0
    if(amount_sol<=0){
      _wToast('Enter a valid SOL amount',false)
      if(buyBtn){buyBtn.disabled=false;buyBtn.textContent=origBuy}
      if(sellBtn) sellBtn.disabled=false
      return
    }
  } else {
    var pct=parseFloat((document.getElementById('wsel-'+i)||{}).value)||100
    if(pct>=100){
      amount_sol=0
    } else {
      var tokUsd=(tok.usd_value||tok.value_usd||0)*pct/100
      var solPx=window._wSolPrice||0
      amount_sol=solPx>0?tokUsd/solPx:0
    }
  }

  fetch('/api/instant-trade',{
    method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token_address:tok.mint,symbol:tok.symbol||'',side:side,amount_sol:amount_sol})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success||d.ok){
      _wToast((side==='buy'?'✅ Bought ':'✅ Sold ')+(tok.symbol||''),true)
      loadTokens(true)
    } else {
      _wToast('❌ '+(d.error||'Trade failed'),false)
      if(buyBtn){buyBtn.disabled=false;buyBtn.textContent=origBuy}
      if(sellBtn){sellBtn.disabled=false;sellBtn.textContent=origSell}
    }
  }).catch(function(){
    _wToast('❌ Network error',false)
    if(buyBtn){buyBtn.disabled=false;buyBtn.textContent=origBuy}
    if(sellBtn){sellBtn.disabled=false;sellBtn.textContent=origSell}
  })
}

// ── balance ───────────────────────────────────────────────
function loadBalance(){
  fetch('/api/wallet/balance').then(function(r){return r.json()}).then(function(d){
    if(d.sol!=null) document.getElementById('sol').textContent=parseFloat(d.sol).toFixed(4)
    if(d.usd!=null) document.getElementById('usd').textContent=parseFloat(d.usd).toFixed(2)
    if(d.sol!=null) document.getElementById('avail').textContent=parseFloat(d.sol).toFixed(4)+' SOL'
  }).catch(function(){
    document.getElementById('sol').textContent='—'
    document.getElementById('usd').textContent='—'
  })
}
loadBalance()

// ── holdings ──────────────────────────────────────────────
function loadTokens(bust){
  var wrap=document.getElementById('tokens')
  wrap.innerHTML='<div class="state-msg">Loading…</div>'
  fetch('/api/wallet/tokens'+(bust?'?bust=1':'')).then(function(r){return r.json()}).then(function(d){
    if(!d.ok && !d.tokens){wrap.innerHTML='<div class="state-msg">Failed to load</div>';return}
    var tokens=d.tokens||[]

    // SOL entry for USD total
    var solToken=tokens.find(function(x){return x.symbol==='SOL'})
    if(solToken){
      var usdVal=parseFloat(solToken.usd_value||solToken.value_usd||0)
      document.getElementById('usd').textContent=usdVal.toFixed(2)
    }

    var spl=tokens.filter(function(x){return x.symbol!=='SOL'})
    window._wTokens=spl
    window._wSolPrice=solToken?parseFloat(solToken.price_usd||0):0

    // portfolio PnL
    var totalCost=0,totalCur=0,hasPnl=false
    spl.forEach(function(x){
      var avg=parseFloat(x.avg_price||0)
      var cur=parseFloat(x.price_usd||0)
      var amt=parseFloat(x.amount||0)
      if(avg>0&&cur>0&&amt>0){totalCost+=avg*amt;totalCur+=cur*amt;hasPnl=true}
    })
    var ppEl=document.getElementById('portfolio-pnl')
    if(ppEl&&hasPnl){
      var pnlUsd=totalCur-totalCost
      var pnlPct=totalCost>0?(pnlUsd/totalCost*100):0
      var col=pnlUsd>=0?'#00d084':'#ff4757'
      var sign=pnlUsd>=0?'+':''
      ppEl.style.display='flex'
      ppEl.innerHTML='<span style="color:var(--muted)">Portfolio PnL</span>'
        +'<span style="color:'+col+';font-weight:600">'+sign+'$'+Math.abs(pnlUsd).toFixed(2)
        +' <span style="opacity:.65">('+sign+pnlPct.toFixed(2)+'%)</span></span>'
      var todayEl=document.getElementById('today-pct')
      if(todayEl){
        todayEl.textContent=(pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'% today'
        todayEl.style.color=col
        todayEl.style.display='inline'
      }
    }

    if(!spl.length){
      wrap.innerHTML='<div class="state-msg">No SPL tokens in wallet</div>'
      return
    }

    wrap.innerHTML=spl.map(function(x,i){
      var sym=x.symbol||'?'
      var amt=parseFloat(x.amount||0)
      var usd=parseFloat(x.usd_value||x.value_usd||0)
      var amtStr=amt===0?'0':amt<0.0001?amt.toExponential(2):amt<1?amt.toFixed(6):amt.toFixed(4)
      var logo=x.logo_url||''
      var init=sym.slice(0,2).toUpperCase()
      var circ='<div class="tok-init" style="background:'+_symColor(sym)+'">'+init+'</div>'
      var logoHtml=logo
        ?'<img class="tok-logo" src="'+logo+'" alt="'+init+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'+circ
        :circ

      var pnlHtml=''
      var avg=parseFloat(x.avg_price||0),cur=parseFloat(x.price_usd||0)
      if(avg>0&&cur>0){
        var chg=(cur-avg)/avg*100
        var col=chg>=0?'var(--green)':'var(--red)'
        pnlHtml='<div class="tok-pct" style="color:'+col+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</div>'
      }

      return '<div class="tok-row">'
        +logoHtml
        +'<div class="tok-info" onclick="window.location=\'/live-market?token=\'+encodeURIComponent(\''+sym+'\')">'
          +'<div class="tok-name">'+sym+'</div>'
          +'<div class="tok-amount">'+amtStr+'</div>'
        +'</div>'
        +'<div class="tok-trade" onclick="event.stopPropagation()">'
          +'<input id="winput-'+i+'" class="w-inp" type="number" value="0.1" min="0.000001" step="0.01">'
          +'<button id="wbtn-'+i+'-buy" class="w-buy-btn" onclick="_wTrade('+i+',\'buy\')">BUY</button>'
          +'<select id="wsel-'+i+'" class="w-sel">'
            +'<option value="25">25%</option>'
            +'<option value="50">50%</option>'
            +'<option value="100" selected>100%</option>'
          +'</select>'
          +'<button id="wbtn-'+i+'-sell" class="w-sell-btn" onclick="_wTrade('+i+',\'sell\')">SELL</button>'
        +'</div>'
        +'<div class="tok-val">'
          +'<div class="tok-usd">$'+usd.toFixed(2)+'</div>'
          +pnlHtml
        +'</div>'
      +'</div>'
    }).join('')

  }).catch(function(err){
    console.error('[wallet/tokens]', err)
    wrap.innerHTML='<div class="state-msg">Failed to load tokens</div>'
  })
}

loadTokens()
</script>
