<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wallet — OrcAgent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}
body{background:#0a0b0e;color:#eef1f5;font-family:'Geist',sans-serif;padding:24px;max-width:700px}
.card{background:#101216;border:1px solid #21252c;border-radius:18px;padding:20px;margin-bottom:16px}
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:#565d68}
.accent{color:#3ad29b}
.btn-p{background:#3ad29b;color:#08120f;border:none;border-radius:12px;padding:12px;font-weight:700;cursor:pointer;flex:1}
.btn-o{background:#0a0b0e;border:1px solid #2c313a;color:#eef1f5;border-radius:12px;padding:12px;cursor:pointer;flex:1}
</style>
</head>
<body style="background:#0a0b0e;color:#eef1f5;font-family:sans-serif;margin:0;padding:20px">
<h2>Wallet</h2>
<p style="color:#565d68;font-size:13px;font-family:monospace">{{ wallet_address }}</p>
<p id="sol" style="font-size:32px;color:#3ad29b;font-family:monospace">Loading...</p>
<div id="tokens"></div>
<script>
fetch('/api/wallet/balance').then(r=>r.json()).then(d=>{
  document.getElementById('sol').textContent=(d.sol||0).toFixed(4)+' SOL'
})
fetch('/api/wallet/tokens').then(r=>r.json()).then(d=>{
  var tokens = d.tokens || d || [];
  document.getElementById('tokens').innerHTML=tokens.map(t=>`<div style="padding:8px 0;border-bottom:1px solid #16191f">${t.symbol||t.mint||'?'} &nbsp; ${t.amount||0}</div>`).join('')||'<p style="color:#565d68">No tokens</p>'
})
</script>
</body>
</html>
