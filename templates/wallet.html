<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wallet — OrcAgent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}
body{background:#0a0b0e;color:#e8eaed;font-family:'Geist',sans-serif;padding:24px;max-width:760px;font-size:14px}
.card{background:#101216;border:1px solid #1a1f2e;border-radius:18px;padding:20px;margin-bottom:16px}
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:#565d68}
.accent{color:#3ad29b}
.btn-p{background:#3ad29b;color:#08120f;border:none;border-radius:12px;padding:12px;font-weight:700;cursor:pointer;flex:1}
.btn-o{background:#0a0b0e;border:1px solid #2c313a;color:#e8eaed;border-radius:12px;padding:12px;cursor:pointer;flex:1}
.w-buy-btn{background:#0a2a1a;color:#00d084;border:1px solid #00d08430;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:background .15s,color .15s}
.w-buy-btn:hover{background:#00d084;color:#000}
.w-buy-btn:disabled{opacity:.45;cursor:not-allowed}
.w-sell-btn{background:#1a0a0a;color:#ff4757;border:1px solid #ff475730;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:background .15s,color .15s}
.w-sell-btn:hover{background:#ff4757;color:#fff}
.w-sell-btn:disabled{opacity:.45;cursor:not-allowed}
.w-inp{width:80px;background:#0a0c14;border:1px solid #1a1f2e;border-radius:8px;color:#e8eaed;padding:6px 10px;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none}
.w-inp:focus{border-color:#3ad29b44}
.w-sel{background:#1a0a0a;color:#ff4757;border:1px solid #ff475730;border-radius:8px;padding:6px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;outline:none}
</style>
</head>
<body>

<a href="/dashboard" style="color:#565d68;font-size:13px;text-decoration:none">← Back</a>
<h1 style="font-size:20px;font-weight:600;margin:8px 0 20px">Wallet</h1>

<div class="card">
  <div class="muted" style="font-size:11px;letter-spacing:0.12em">TOTAL BALANCE</div>
  <div style="font-size:40px;font-weight:700;font-family:monospace;margin-top:8px">
    <span id="sol">...</span> <span class="muted" style="font-size:18px">SOL</span>
    <span id="pct" style="color:#3ad29b;font-size:13px;margin-left:12px"></span>
  </div>
  <div class="muted" style="font-size:13px;font-family:monospace">≈ $<span id="usd">...</span> USD</div>
  <div id="portfolio-pnl" style="display:none;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:13px"></div>
  <div style="display:flex;gap:9px;margin-top:16px">
    <button onclick="window.location='/?action=deposit'" style="background:#3ad29b;color:#08120f;border:none;border-radius:12px;padding:12px;font-weight:700;cursor:pointer;flex:1">↓ Deposit</button>
    <button onclick="window.location='/?action=withdraw'" style="background:#0a0b0e;border:1px solid #2c313a;color:#eef1f5;border-radius:12px;padding:12px;cursor:pointer;flex:1">↑ Withdraw</button>
  </div>
  <div style="display:flex;margin-top:10px;border:1px solid #21252c;border-radius:12px;overflow:hidden">
    <div style="flex:1;padding:12px;background:#0d0f12">
      <div style="color:#565d68;font-size:11px">Available</div>
      <div style="font-family:monospace;font-size:16px;font-weight:700;margin-top:4px"><span id="avail">...</span> SOL</div>
    </div>
    <div style="flex:1;padding:12px;background:#0d0f12;border-left:1px solid #21252c">
      <div style="color:#565d68;font-size:11px">In positions</div>
      <div style="font-family:monospace;font-size:16px;font-weight:700;color:#3ad29b;margin-top:4px"><span id="inpos">0</span> SOL</div>
    </div>
  </div>
</div>

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-weight:600">Holdings</div>
    <button onclick="loadTokens(true)" style="background:none;border:1px solid #35d4c4;color:#35d4c4;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;">↻ Refresh</button>
  </div>
  <div id="tokens"><span class="muted">Loading...</span></div>
</div>

<script>
fetch('/api/wallet/balance').then(r=>r.json()).then(d=>{
  document.getElementById('sol').textContent=(d.sol||0).toFixed(4)
  document.getElementById('avail').textContent=(d.sol||0).toFixed(4)
}).catch(()=>{
  document.getElementById('sol').textContent='—'
  document.getElementById('usd').textContent='—'
})

function _wToast(msg, ok){
  var t=document.createElement('div')
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'+(ok?'#0a2a1a':'#2a0a0a')+';color:'+(ok?'#3ad29b':'#f76b62')+';border:1px solid '+(ok?'#3ad29b':'#f76b62')+';padding:10px 20px;border-radius:8px;font-size:13px;font-family:\'JetBrains Mono\',monospace;z-index:9999;white-space:nowrap;pointer-events:none;transition:opacity .25s'
  t.textContent=msg
  document.body.appendChild(t)
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},260)},3000)
}

function _wTrade(i, side){
  var tok=(window._wTokens||[])[i]
  if(!tok) return
  var buyBtn=document.getElementById('wbtn-'+i+'-buy')
  var sellBtn=document.getElementById('wbtn-'+i+'-sell')
  var origBuy=buyBtn?buyBtn.textContent:'BUY'
  var origSell=sellBtn?sellBtn.textContent:'SELL'
  if(buyBtn){buyBtn.disabled=true}
  if(sellBtn){sellBtn.disabled=true}
  if(side==='buy'&&buyBtn) buyBtn.textContent='…'
  if(side==='sell'&&sellBtn) sellBtn.textContent='…'

  var amount_sol=0
  if(side==='buy'){
    amount_sol=parseFloat((document.getElementById('winput-'+i)||{}).value)||0
    if(amount_sol<=0){
      _wToast('Enter a valid SOL amount',false)
      if(buyBtn){buyBtn.disabled=false;buyBtn.textContent=origBuy}
      if(sellBtn){sellBtn.disabled=false}
      return
    }
  } else {
    var pct=parseFloat((document.getElementById('wsel-'+i)||{}).value)||100
    if(pct>=100){
      amount_sol=0  // backend does full sell when 0
    } else {
      var tokUsd=(tok.usd_value||tok.value_usd||0)*pct/100
      var solPx=window._wSolPrice||0
      amount_sol=solPx>0?tokUsd/solPx:0
    }
  }

  fetch('/api/instant-trade',{
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token_address:tok.mint,symbol:tok.symbol||'',side:side,amount_sol:amount_sol})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success||d.ok){
      _wToast((side==='buy'?'✅ Bought ':'✅ Sold ')+(tok.symbol||''),true)
      loadTokens(true)
    } else {
      _wToast('❌ '+(d.error||'Trade failed'),false)
      if(buyBtn){buyBtn.disabled=false;buyBtn.textContent=origBuy}
      if(sellBtn){sellBtn.disabled=false;sellBtn.textContent=origSell}
    }
  }).catch(function(){
    _wToast('❌ Network error',false)
    if(buyBtn){buyBtn.disabled=false;buyBtn.textContent=origBuy}
    if(sellBtn){sellBtn.disabled=false;sellBtn.textContent=origSell}
  })
}

function loadTokens(bust){
  const wrap=document.getElementById('tokens')
  wrap.innerHTML='<span class="muted">Loading...</span>'
  fetch('/api/wallet/tokens'+(bust?'?bust=1':'')).then(r=>r.json()).then(d=>{
    const t=d.tokens||[]
    const solToken=t.find(x=>x.symbol==='SOL')
    if(solToken) document.getElementById('usd').textContent=(solToken.usd_value||solToken.value_usd||0).toFixed(2)
    const spl=t.filter(x=>x.symbol!=='SOL')
    if(!spl.length){wrap.innerHTML='<span class="muted" style="font-size:13px">No SPL tokens</span>';return}
    window._wTokens=spl
    window._wSolPrice=solToken?parseFloat(solToken.price_usd||0):0

    // Portfolio PnL total
    let totalPnlUsd=0, hasPnl=false
    spl.forEach(x=>{
      const avg=x.avg_price||0, cur=x.price_usd||0, amt=x.amount||0
      if(avg>0&&cur>0){totalPnlUsd+=(cur-avg)*amt;hasPnl=true}
    })
    const ppEl=document.getElementById('portfolio-pnl')
    if(ppEl&&hasPnl){
      const ppSign=totalPnlUsd>=0?'+':''
      const ppPct=spl.reduce((s,x)=>{
        const avg=x.avg_price||0,cur=x.price_usd||0,amt=x.amount||0
        return avg>0&&cur>0?s+(cur-avg)*amt:s
      },0) / Math.max(spl.reduce((s,x)=>{
        const avg=x.avg_price||0,amt=x.amount||0
        return avg>0?s+avg*amt:s
      },0),0.000001) * 100
      const ppCol=totalPnlUsd>=0?'#3ad29b':'#f76b62'
      ppEl.style.display='block'
      ppEl.innerHTML=`<span style="color:#565d68">Portfolio PnL: </span><span style="color:${ppCol};font-weight:600">${ppSign}$${Math.abs(totalPnlUsd).toFixed(2)} (${ppSign}${ppPct.toFixed(1)}%)</span>`
    }

    wrap.innerHTML=spl.map((x,i)=>{
      const sym=x.symbol||'?'
      const amt=x.amount||0
      const usd=x.usd_value||x.value_usd||0
      const amtStr=amt<0.0001?amt.toExponential(2):amt<1?amt.toFixed(6):amt.toFixed(4)

      // Logo
      const logo=x.logo_url||''
      const initials=sym.slice(0,2).toUpperCase()
      const logoHtml=logo
        ?`<img src="${logo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div style="display:none;width:40px;height:40px;border-radius:50%;background:#141820;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#444;flex-shrink:0">${initials}</div>`
        :`<div style="width:40px;height:40px;border-radius:50%;background:#141820;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#444;flex-shrink:0">${initials}</div>`

      // PnL pill
      let pnlPill=''
      const avg=x.avg_price||0, cur=x.price_usd||0
      if(avg>0&&cur>0){
        const pct=(cur-avg)/avg*100
        const col=pct>=0?'#00d084':'#ff4757'
        const bg=pct>=0?'#00d08415':'#ff475715'
        const sign=pct>=0?'+':''
        pnlPill=`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:${col};background:${bg};border:1px solid ${col}22;border-radius:6px;padding:3px 8px;white-space:nowrap;flex-shrink:0">${sign}${pct.toFixed(1)}%</span>`
      }

      return`<div style="display:flex;align-items:center;padding:16px 0;border-bottom:1px solid #0d1117;gap:16px">
        <div onclick="window.location='/live-market?token='+encodeURIComponent('${sym}')" style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer">
          ${logoHtml}
          <div style="min-width:0">
            <div style="font-weight:700;font-size:14px;color:#e8eaed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sym}</div>
            <div style="font-size:12px;color:#444;font-family:'JetBrains Mono',monospace;margin-top:2px">${amtStr}</div>
          </div>
        </div>
        ${pnlPill}
        <div onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <input id="winput-${i}" class="w-inp" type="number" value="0.1" min="0.001" step="0.01" onclick="event.stopPropagation()">
          <button id="wbtn-${i}-buy" class="w-buy-btn" onclick="event.stopPropagation();_wTrade(${i},'buy')">BUY</button>
          <select id="wsel-${i}" class="w-sel" onclick="event.stopPropagation()">
            <option value="25">25%</option>
            <option value="50">50%</option>
            <option value="100" selected>100%</option>
          </select>
          <button id="wbtn-${i}-sell" class="w-sell-btn" onclick="event.stopPropagation();_wTrade(${i},'sell')">SELL</button>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-weight:600;color:#e8eaed;min-width:80px;text-align:right;font-size:14px;flex-shrink:0">$${usd.toFixed(2)}</div>
      </div>`
    }).join('')
  }).catch(()=>{wrap.innerHTML='<span class="muted">Failed to load</span>'})
}

loadTokens()
</script>
</body>
</html>
