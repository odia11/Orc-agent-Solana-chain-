<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>Notifications — OrcAgent</title><link rel="manifest" href="/static/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="OrcAgent"><link rel="apple-touch-icon" href="/static/favicon.svg?v=2"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}:root{  --bg:#0a0b0e;--bg2:#101216;--bg3:#16191f;--bg4:#21252c;  --accent:#f7b955;--text:#eef1f5;--muted:#565d68;--sub:#8a919c;  --green:#3ad29b;--red:#ff4d6a;--indigo:#6366f1;  --mono:'JetBrains Mono',monospace;--ui:'Geist',system-ui,sans-serif;}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);-webkit-font-smoothing:antialiased}#app{display:flex;min-height:100vh}
#sidebar{width:260px;min-width:260px;height:100vh;position:sticky;top:0;background:var(--bg);border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:20px 20px 14px;flex-shrink:0}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-shape{width:36px;height:36px;min-width:36px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center}
.sb-logo-shape::after{content:'';width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:13px solid var(--bg)}
.sb-logo-text{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.sb-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:1px}
.sb-nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;font-size:14px;font-weight:500;color:var(--sub);transition:background .15s,color .15s;text-decoration:none;border-radius:11px;position:relative}
.sb-nav-item:hover{background:#14171c;color:var(--text)}
.sb-nav-item.active{background:rgba(247,185,85,.12);color:var(--text);font-weight:600}
.sb-nav-item.active::after{content:'';position:absolute;right:12px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.sb-nav-icon{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.sb-nav-badge{margin-left:auto;background:var(--accent);color:var(--bg);font-size:9px;font-weight:700;border-radius:999px;padding:2px 7px;min-width:18px;text-align:center}
.sb-bottom{padding:12px;border-top:1px solid var(--bg3);flex-shrink:0;margin-top:auto}
.sb-user-card{display:flex;align-items:center;gap:11px;padding:10px;border-radius:14px;border:1px solid var(--bg3)}
.sb-avatar{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;overflow:hidden;position:relative}
.sb-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-handle{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.sb-sol-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.sb-sol{font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono);white-space:nowrap}
.sb-sol-label{font-size:10px;color:var(--muted);font-family:var(--mono)}
.main{flex:1;min-width:0}
.ntf-header{position:sticky;top:0;z-index:20;display:flex;align-items:flex-start;justify-content:space-between;padding:28px 32px 20px;background:var(--bg)}
.ntf-title{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.ntf-unread-sub{font-size:13px;color:var(--muted);margin-top:4px}
.ntf-mark-all{background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ui);white-space:nowrap}
.ntf-mark-all:hover{text-decoration:underline}
.ntf-select-toggle{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ui);white-space:nowrap;padding:0}
.ntf-select-toggle:hover{color:var(--text)}
.ntf-select-toggle.active{color:var(--accent)}
.ntf-select-bar{display:none;align-items:center;justify-content:space-between;gap:12px;padding:10px 4px;margin-bottom:6px;border-bottom:1px solid var(--bg3);flex-wrap:wrap}
.ntf-select-count{font-size:13px;color:var(--sub);font-weight:600;white-space:nowrap}
.ntf-select-actions{display:flex;gap:8px;flex-wrap:wrap}
.ntf-select-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--text);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:var(--ui);white-space:nowrap;transition:background .15s,opacity .15s;min-height:36px}
.ntf-select-btn:hover{background:var(--bg4)}
.ntf-select-btn:disabled{opacity:.45;cursor:default}
.ntf-select-btn:disabled:hover{background:var(--bg3)}
.ntf-select-btn.danger{background:rgba(255,77,106,.12);border-color:rgba(255,77,106,.3);color:var(--red)}
.ntf-select-btn.danger:hover{background:rgba(255,77,106,.2)}
.ntf-select-btn.danger:disabled:hover{background:rgba(255,77,106,.12)}
.ntf-select-btn.cancel{background:none;border-color:transparent;color:var(--muted)}
.ntf-select-btn.cancel:hover{color:var(--text);background:var(--bg3)}
.ntf-select-checkbox{display:flex;align-items:center;flex-shrink:0;padding-top:8px;cursor:pointer}
.ntf-select-checkbox input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.ntf-row-selectable{cursor:pointer}
.ntf-row-selected{background:rgba(247,185,85,.06)}
.ntf-body{max-width:640px;padding:0 32px 60px}
.ntf-tabs{display:flex;gap:22px;border-bottom:1px solid var(--bg3);margin-bottom:8px}
.ntf-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 0 11px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;font-family:var(--ui);transition:color .15s,border-color .15s;margin-bottom:-1px}
.ntf-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.ntf-tab:hover:not(.active){color:#c0c8d4}
.ntf-list{display:flex;flex-direction:column}
.ntf-row-wrap{position:relative;overflow:hidden}
.ntf-swipe-delete-btn{position:absolute;top:0;right:0;height:100%;width:84px;background:#ff3b3b;color:#fff;border:none;font-size:12px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation}
.ntf-row{display:flex;align-items:flex-start;gap:12px;padding:16px 4px;border-bottom:1px solid var(--bg3);text-decoration:none;color:inherit;position:relative;background:var(--bg);touch-action:pan-y}
.ntf-row:hover{background:#0d0e11}
.ntf-row-link{display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0;text-decoration:none;color:inherit}
.ntf-share-btn{flex-shrink:0;align-self:center;background:none;border:1px solid var(--bg4);color:var(--accent);font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:var(--ui);white-space:nowrap;transition:background .15s;min-height:32px}
.ntf-share-btn:hover{background:rgba(247,185,85,.08)}
.ntf-share-btn:disabled{opacity:.6;cursor:default}
@media(max-width:767px){ .ntf-share-btn{min-height:44px} }
.ntf-icon{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
.ntf-icon.trade-up{background:rgba(58,210,155,.14);color:var(--green)}
.ntf-icon.trade-down{background:rgba(255,77,106,.14);color:var(--red)}
.ntf-icon.copy{background:rgba(247,185,85,.14);color:var(--accent)}
.ntf-icon.social{background:rgba(255,77,106,.14);color:var(--red)}
.ntf-icon.message{background:rgba(99,102,241,.14);color:var(--indigo)}
.ntf-icon.system{background:var(--bg3);color:var(--sub)}
.ntf-info{flex:1;min-width:0}
.ntf-text{font-size:14px;color:var(--text);line-height:1.4}
.ntf-chip{display:inline-flex;align-items:center;gap:8px;margin-top:8px;padding:6px 12px;border-radius:9px;font-family:var(--mono);font-size:12px;font-weight:700}
.ntf-chip.pos{background:rgba(58,210,155,.1);color:var(--green)}
.ntf-chip.neg{background:rgba(255,77,106,.1);color:var(--red)}
.ntf-chip.neutral{background:var(--bg3);color:var(--sub);font-weight:600}
.ntf-meta{font-size:12px;color:var(--muted);margin-top:8px}
.ntf-unread-dot{position:absolute;right:4px;top:22px;width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ntf-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.ntf-empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.ntf-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;align-self:center}
.ntf-read-btn,.ntf-delete-btn{width:28px;height:28px;border:none;background:transparent;border-radius:7px;cursor:pointer;align-items:center;justify-content:center;transition:opacity .12s,background .12s,color .12s}
.ntf-read-btn{color:var(--muted);display:flex;opacity:1}
.ntf-delete-btn{color:var(--muted);display:none;opacity:0}
@media(hover:hover) and (pointer:fine){
  .ntf-read-btn{opacity:0}
  .ntf-row:hover .ntf-read-btn{opacity:1}
  .ntf-read-btn:hover{background:rgba(247,185,85,.12);color:var(--accent)}
  .ntf-delete-btn{display:flex}
  .ntf-row:hover .ntf-delete-btn{opacity:1}
  .ntf-delete-btn:hover{background:rgba(255,77,106,.14);color:var(--red)}
}
/* ── SHARED DELETE-CONFIRM MODAL (matches messages.html / dashboard.html) ── */
.s-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,18,30,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:1rem}
.s-modal.open{display:flex}
.s-card{background:var(--bg2);border:1px solid rgba(247,185,85,.3);border-radius:14px;padding:26px 24px;width:100%;max-width:480px;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5)}
.s-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:4px}
.s-close:hover{color:var(--text)}
.s-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.s-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:18px}
.mobile-back-bar{display:none}
@media(max-width:1024px){
  #sidebar{display:none!important}
}
@media(max-width:767px){
  html,body{overflow-x:hidden}
  #app{display:block;height:auto}
  .ntf-header{display:none!important}
  .mobile-back-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;position:sticky;top:0;z-index:30;background:var(--bg2);border-bottom:1px solid var(--bg3)}
  .mobile-back-btn{color:var(--accent);font-size:15px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;min-height:44px;min-width:44px;display:inline-flex;align-items:center}
  .mobile-page-title{font-size:16px;font-weight:600;color:var(--text);font-family:inherit}
  .ntf-body{padding:0 16px 60px;max-width:100%}
  .ntf-tab{min-height:44px}
  .ntf-mark-all{min-height:44px}
  .ntf-select-toggle{min-height:44px}
  .ntf-select-btn{min-height:44px;flex:1}
  .ntf-select-bar{padding:10px 0}
}
</style></head><body>

<script>
var _csrfToken = {{ csrf_token|tojson }};
var _personal = [];
var _trades = [];
var _activeTab = 'all';
function _esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _relTime(ts){
  if(!ts) return '';
  var iso = ts.replace(' ','T');
  if(!iso.endsWith('Z')) iso += 'Z';
  var d = new Date(iso);
  var s = Math.floor((Date.now()-d)/1000);
  if(s<60)     return 'just now';
  if(s<3600)   return Math.floor(s/60)+'m ago';
  if(s<86400)  return Math.floor(s/3600)+'h ago';
  if(s<172800) return 'yesterday';
  return d.toLocaleDateString('en-US',{day:'numeric',month:'short'});
}
var _ICON_SVG = {
  'trade-up':   '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',

  'social':     '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
  'message':    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  'system':     '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>'
};
function _parseTradeContent(content){
  var m = content.match(/^Trade closed:\s*\$?(\S+)\s*([+\-][\d.]+)%\s*\(([+\-][\d.]+)\s*SOL\)(?:\s*—\s*(.+))?$/);
  if(!m) return {headline: content, chip: null, positive: true};
  var symbol = m[1], pct = m[2], sol = m[3], reason = m[4] || '';
  var positive = pct.indexOf('-') !== 0;
  var reasonText = reason ? (reason.indexOf('take') > -1 ? 'at take-profit' : reason.indexOf('stop') > -1 ? 'at stop-loss' : 'at ' + reason) : '';
  return {
    headline: 'Your bot closed $' + symbol + (reasonText ? ' ' + reasonText : '') + '.',
    chip: pct + '% · ' + sol + ' SOL',
    positive: positive
  };
}
// Shared actions for any REAL personal notification (has a DB id + is_read
// state). The synthetic kind==='trade' rows (pulled live from the trades
// table, no id at all) never get these -- there's no notification row to
// mark read or delete. Mark-as-read icon: always visible on mobile,
// hover-reveal on desktop. Delete icon: desktop-only (see CSS), never
// shown on touch/mobile at all.
function _actionsHtml(n, isUnread){
  var readBtn = isUnread
    ? '<button class="ntf-read-btn" title="Mark as read" aria-label="Mark as read" '
      + 'onclick="event.preventDefault();event.stopPropagation();_markOneRead(' + n.id + ')">'
      + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      + '</button>'
    : '';
  var deleteBtn = '<button class="ntf-delete-btn" title="Delete" aria-label="Delete notification" '
    + 'onclick="event.preventDefault();event.stopPropagation();_confirmDeleteNotif(' + n.id + ')">'
    + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>'
    + '</button>';
  return '<div class="ntf-actions">' + readBtn + deleteBtn + '</div>';
}
// Shared wrap/row markup for any REAL personal notification (has a DB id).
// In select mode: no swipe-delete button (avoid gesture conflicts with the
// checkbox tap target), no per-row checkmark/trash (bulk actions replace
// them), the whole row becomes one big tap target that toggles selection
// instead of navigating. Outside select mode: unchanged from before --
// .ntf-swipe-delete-btn sits BEFORE .ntf-row in DOM order so the row's own
// background paints on top of it at rest (a later sibling would otherwise
// always win the paint order and show through as a permanent bar — the
// exact bug hit and fixed in Messages).
function _buildPersonalRow(n, isUnread, iconCls, bodyHtml, href, extraButtonHtml){
  var timeStr = _esc(_relTime(n.created_at));
  if(_selectMode){
    var checked = _selectedIds.has(n.id);
    return '<div class="ntf-row-wrap" data-notif-id="' + n.id + '">'
      + '<div class="ntf-row ntf-row-selectable' + (checked ? ' ntf-row-selected' : '') + '" data-notif-id="' + n.id + '" onclick="_toggleSelect(' + n.id + ')">'
      + '<label class="ntf-select-checkbox" onclick="event.stopPropagation()">'
      + '<input type="checkbox"' + (checked ? ' checked' : '') + ' onchange="_toggleSelect(' + n.id + ')" aria-label="Select notification">'
      + '</label>'
      + '<div class="ntf-icon ' + iconCls + '">' + (_ICON_SVG[iconCls] || _ICON_SVG.system) + '</div>'
      + '<div class="ntf-info">' + bodyHtml + '<div class="ntf-meta">' + timeStr + '</div></div>'
      + (isUnread ? '<div class="ntf-unread-dot"></div>' : '')
      + '</div>'
      + '</div>';
  }
  return '<div class="ntf-row-wrap" data-notif-id="' + n.id + '">'
    + '<button class="ntf-swipe-delete-btn">Delete</button>'
    + '<div class="ntf-row" data-notif-id="' + n.id + '">'
    + '<a class="ntf-row-link" href="' + _esc(href) + '" data-id="' + n.id + '" onclick="_markOneRead(' + n.id + ')">'
    + '<div class="ntf-icon ' + iconCls + '">' + (_ICON_SVG[iconCls] || _ICON_SVG.system) + '</div>'
    + '<div class="ntf-info">' + bodyHtml + '<div class="ntf-meta">' + timeStr + '</div></div>'
    + '</a>'
    + (extraButtonHtml || '')
    + _actionsHtml(n, isUnread)
    + (isUnread ? '<div class="ntf-unread-dot"></div>' : '')
    + '</div>'
    + '</div>';
}
function _rowHtml(n, kind){
  var isUnread = kind === 'personal' && !n.is_read;
  var iconCls, bodyHtml, timeStr;
  if(kind === 'trade'){
    var raw = 'Trade closed: $' + n.symbol + ' ' + (n.pnl_pct>=0?'+':'') + (n.pnl_pct||0).toFixed(1) + '% (' + (n.pnl>=0?'+':'') + (n.pnl||0).toFixed(4) + ' SOL)';
    var parsed = _parseTradeContent(raw);
    iconCls = parsed.positive ? 'trade-up' : 'trade-down';
    bodyHtml = '<div class="ntf-text">' + _esc(parsed.headline) + '</div>'
      + (parsed.chip ? '<div class="ntf-chip ' + (parsed.positive?'pos':'neg') + '">' + _esc(parsed.chip) + '</div>' : '');
    timeStr = _relTime(n.created_at);
    return '<div class="ntf-row" style="cursor:default">'
      + '<div class="ntf-icon ' + iconCls + '">' + _ICON_SVG[iconCls] + '</div>'
      + '<div class="ntf-info">' + bodyHtml + '<div class="ntf-meta">' + _esc(timeStr) + '</div></div>'
      + '</div>';
  }
  var type = n.type || 'system';
  if(type === 'trade'){
    var p = _parseTradeContent(n.content);
    iconCls = p.positive ? 'trade-up' : 'trade-down';
    bodyHtml = '<div class="ntf-text">' + _esc(p.headline) + '</div>'
      + (p.chip ? '<div class="ntf-chip ' + (p.positive?'pos':'neg') + '">' + _esc(p.chip) + '</div>' : '');
    // The bot no longer auto-posts this trade anywhere — give the user an
    // explicit, one-click way to share it themselves if they want to
    // (hidden in select mode along with the other per-row actions).
    var shareBtn = _selectMode ? '' : '<button class="ntf-share-btn" data-content="' + _esc(n.content) + '" onclick="_shareTrade(this,event)">Share</button>';
    return _buildPersonalRow(n, isUnread, iconCls, bodyHtml, n.link || '#', shareBtn);
  } else if(type === 'message'){
    iconCls = 'message';
    bodyHtml = '<div class="ntf-text">' + _esc(n.content) + '</div>';
  } else {
    iconCls = 'social';
    bodyHtml = '<div class="ntf-text">' + _esc(n.content) + '</div>';
  }
  return _buildPersonalRow(n, isUnread, iconCls, bodyHtml, n.link || '#', null);
}
function _shareTrade(btn, ev){
  ev.preventDefault();
  ev.stopPropagation();
  var content = btn.getAttribute('data-content') || '';
  var m = content.match(/^Trade closed:\s*\$?(\S+)\s*([+\-][\d.]+)%\s*\(([+\-][\d.]+)\s*SOL\)/);
  if(!m) return;
  var symbol = m[1], pct = m[2], sol = m[3];
  var shareText = 'Just closed $' + symbol + ' ' + pct + '% (' + sol + ' SOL) on OrcAgent 🐋';
  btn.disabled = true;
  btn.textContent = 'Sharing…';
  fetch('/api/feed/post', {
    method: 'POST',
    headers: {'Content-Type':'application/json', 'X-CSRF-Token':_csrfToken},
    body: JSON.stringify({content: shareText})
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d.ok){
      btn.textContent = 'Shared ✓';
    } else {
      btn.disabled = false;
      btn.textContent = 'Share';
      openAlertModal({text:d.msg || 'Could not share'});
    }
  }).catch(function(){
    btn.disabled = false;
    btn.textContent = 'Share';
  });
}
function _render(){
  // Skip a rebuild while a row is mid-swipe -- a full innerHTML replace would
  // silently snap it shut. Same guard used in Messages; here nothing polls
  // #ntf-list automatically (notif-poll.js only touches the badge), but tab
  // switches or another row's mark-read/delete could still land mid-swipe.
  if (_ntfSwipeOpenWrap && document.body.contains(_ntfSwipeOpenWrap)) return;
  var list = document.getElementById('ntf-list');
  var rows = [];
  if(_activeTab === 'all' || _activeTab === 'social'){
    _personal.forEach(function(n){ rows.push({n:n, kind:'personal', ts:n.created_at}); });
  }
  if(_activeTab === 'all' || _activeTab === 'trades'){
    _trades.forEach(function(n){ rows.push({n:n, kind:'trade', ts:n.created_at}); });
  }
  rows.sort(function(a,b){ return new Date(b.ts) - new Date(a.ts); });
  if(!rows.length){
    list.innerHTML = '<div class="ntf-empty"><div class="ntf-empty-icon">🔔</div>No notifications yet</div>';
    return;
  }
  list.innerHTML = rows.map(function(r){ return _rowHtml(r.n, r.kind); }).join('');
  list.querySelectorAll('.ntf-row-wrap').forEach(function(wrap){
    var delBtn = wrap.querySelector('.ntf-swipe-delete-btn');
    if (!delBtn) return; // select mode: no swipe-delete button rendered
    var id = parseInt(wrap.dataset.notifId, 10);
    var content = wrap.querySelector('.ntf-row');
    _attachNtfSwipeToDelete(wrap, content, delBtn, {
      onDelete: function(){ _confirmDeleteNotif(id); }
    });
  });
}
// ── SWIPE-TO-DELETE (touch-only; vanilla touchstart/touchmove/touchend, no
// library) — same mechanism as Messages' swipe-to-delete. One difference:
// .ntf-row contains a real <a href> (Messages' .conv-row doesn't), so the
// "tap while swiped open closes it instead of navigating" handler here must
// call preventDefault()/stopPropagation() or the anchor's own navigation
// would still fire alongside the close. ──
var _ntfSwipeOpenWrap = null;
function _attachNtfSwipeToDelete(wrapEl, contentEl, deleteBtnEl, opts){
  var ACTION_WIDTH = 84;
  var startX = 0, startY = 0, startTranslate = 0, dragging = false, horizontal = null, moved = false;

  function curTranslate(){
    var m = /translateX\((-?\d+(?:\.\d+)?)px\)/.exec(contentEl.style.transform);
    return m ? parseFloat(m[1]) : 0;
  }
  function setTranslate(x, animate){
    contentEl.style.transition = animate ? 'transform .2s ease' : 'none';
    contentEl.style.transform = 'translateX(' + x + 'px)';
  }
  function closeRow(animate){
    setTranslate(0, animate !== false);
    wrapEl.dataset.swipeOpen = '0';
    if (_ntfSwipeOpenWrap === wrapEl) _ntfSwipeOpenWrap = null;
  }
  function openRow(){
    if (_ntfSwipeOpenWrap && _ntfSwipeOpenWrap !== wrapEl) {
      var otherContent = _ntfSwipeOpenWrap.querySelector('.ntf-row');
      if (otherContent) { otherContent.style.transition = 'transform .2s ease'; otherContent.style.transform = 'translateX(0)'; }
      _ntfSwipeOpenWrap.dataset.swipeOpen = '0';
    }
    setTranslate(-ACTION_WIDTH, true);
    wrapEl.dataset.swipeOpen = '1';
    _ntfSwipeOpenWrap = wrapEl;
  }

  wrapEl.addEventListener('touchstart', function(e){
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTranslate = curTranslate();
    dragging = true; horizontal = null; moved = false;
  }, {passive: true});

  wrapEl.addEventListener('touchmove', function(e){
    if (!dragging) return;
    var dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
    if (horizontal === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) horizontal = Math.abs(dx) > Math.abs(dy);
    if (horizontal) {
      e.preventDefault();
      moved = true;
      setTranslate(Math.max(-ACTION_WIDTH, Math.min(0, startTranslate + dx)), false);
    }
  }, {passive: false});

  function endDrag(){
    if (!dragging) return;
    dragging = false;
    if (horizontal && moved) {
      if (curTranslate() < -ACTION_WIDTH * 0.35) openRow(); else closeRow();
    }
    horizontal = null; moved = false;
  }
  wrapEl.addEventListener('touchend', endDrag, {passive: true});
  wrapEl.addEventListener('touchcancel', endDrag, {passive: true});

  // capture phase: must run before the inner <a>'s own navigation/onclick so
  // preventDefault() here actually stops it when we're just closing an open swipe.
  contentEl.addEventListener('click', function(e){
    if (wrapEl.dataset.swipeOpen === '1') {
      e.preventDefault();
      e.stopPropagation();
      closeRow();
    }
  }, true);
  deleteBtnEl.addEventListener('click', function(ev){
    ev.stopPropagation();
    if (opts.onDelete) opts.onDelete();
  });
}
function _switchTab(tab){
  _activeTab = tab;
  ['all','trades','social'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  _render();
}
function _updateUnreadUI(){
  var unread = _personal.filter(function(n){ return !n.is_read; }).length;
  var sub = document.getElementById('ntf-unread-sub');
  if(sub) sub.textContent = unread ? (unread + ' unread') : 'All caught up';
  var badge = document.getElementById('sb-notif-badge');
  if(badge){ if(unread){ badge.textContent = unread; badge.style.display = ''; } else { badge.style.display = 'none'; } }
}
async function _loadPersonal(){
  var r = await fetch('/api/notifications/mine').then(function(x){return x.json();}).catch(function(){return null;});
  _personal = (r && r.ok && r.notifications) ? r.notifications : [];
  _updateUnreadUI();
  _render();
}
async function _loadTrades(){
  var d = await fetch('/api/notifications').then(function(r){return r.json();}).catch(function(){return [];});
  _trades = Array.isArray(d) ? d : [];
  _render();
}
async function _markAllRead(){
  await fetch('/api/notifications/mine/mark_all_read', {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':_csrfToken}
  }).catch(function(){});
  _loadPersonal();
}
// Marking a single notification as read is triggered both by clicking the
// row itself (natural "I saw this" signal, alongside its normal navigation)
// and by the dedicated checkmark icon (for clearing unread state without
// leaving the page). Updates only the specific row's DOM (not a full
// _render()) so it never races with the row-link's own default navigation —
// replacing #ntf-list's innerHTML mid-click can cancel that navigation in
// some browsers since the clicked <a> would be removed from the document
// before its default action completes.
function _markOneRead(id){
  var n = _personal.find(function(x){ return x.id === id; });
  if(!n || n.is_read) return;
  n.is_read = true;
  _updateUnreadUI();
  var row = document.querySelector('.ntf-row[data-notif-id="' + id + '"]');
  if(row){
    var dot = row.querySelector('.ntf-unread-dot'); if(dot) dot.remove();
    var btn = row.querySelector('.ntf-read-btn'); if(btn) btn.remove();
  }
  fetch('/api/notifications/mine/mark_read_batch', {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':_csrfToken},
    body: JSON.stringify({ids:[id]})
  }).catch(function(){});
}
function _confirmDeleteNotif(id){
  openDeleteConvoModal(function(){ _deleteNotif(id); }, {
    title: 'Delete this notification?',
    text: "This can't be undone."
  });
}
async function _deleteNotif(id){
  var r = await fetch('/api/notifications/mine/' + id, {
    method:'DELETE', headers:{'X-CSRF-Token':_csrfToken}
  }).then(function(x){return x.json();}).catch(function(){return null;});
  if(r && r.ok){
    _personal = _personal.filter(function(n){ return n.id !== id; });
    _updateUnreadUI();
    // If this row was the one tracked as swiped-open, release the lock before
    // _render() -- otherwise _render()'s own guard (skip rebuild while a row
    // is swiped open) would block removing the very row just deleted, since
    // it's still in the DOM and still flagged open at this point.
    if (_ntfSwipeOpenWrap && _ntfSwipeOpenWrap.dataset.notifId === String(id)) _ntfSwipeOpenWrap = null;
    _render();
  } else {
    openAlertModal({text:(r && r.msg) || 'Could not delete this notification.'});
  }
}

// ── BULK SELECT ──────────────────────────────────────────────────────────
var _selectMode = false;
var _selectedIds = new Set();

function _toggleSelectMode(){
  if(_selectMode) _exitSelectMode(); else _enterSelectMode();
}
function _enterSelectMode(){
  _selectMode = true;
  _selectedIds = new Set();
  _ntfSwipeOpenWrap = null; // don't let a leftover swipe-lock block the rebuild below
  ['mb-select-toggle','dt-select-toggle'].forEach(function(id){
    var el = document.getElementById(id);
    if(el){ el.textContent = 'Cancel'; el.classList.add('active'); }
  });
  var bar = document.getElementById('ntf-select-bar');
  if(bar) bar.style.display = 'flex';
  _updateSelectBar();
  _render();
}
function _exitSelectMode(){
  _selectMode = false;
  _selectedIds = new Set();
  ['mb-select-toggle','dt-select-toggle'].forEach(function(id){
    var el = document.getElementById(id);
    if(el){ el.textContent = 'Select'; el.classList.remove('active'); }
  });
  var bar = document.getElementById('ntf-select-bar');
  if(bar) bar.style.display = 'none';
  _render();
}
// Targeted DOM update (not a full _render()) for the same reason _markOneRead
// avoids one -- toggling a single checkbox should feel instant, not reflow
// the whole list.
function _toggleSelect(id){
  if(_selectedIds.has(id)) _selectedIds.delete(id); else _selectedIds.add(id);
  var row = document.querySelector('.ntf-row[data-notif-id="' + id + '"]');
  if(row){
    var checked = _selectedIds.has(id);
    row.classList.toggle('ntf-row-selected', checked);
    var cb = row.querySelector('.ntf-select-checkbox input');
    if(cb) cb.checked = checked;
  }
  _updateSelectBar();
}
function _updateSelectBar(){
  var count = _selectedIds.size;
  var countEl = document.getElementById('ntf-select-count');
  if(countEl) countEl.textContent = count + ' selected';
  var markBtn = document.getElementById('ntf-bulk-mark-btn');
  var delBtn = document.getElementById('ntf-bulk-delete-btn');
  if(markBtn) markBtn.disabled = count === 0;
  if(delBtn) delBtn.disabled = count === 0;
}
async function _bulkMarkRead(){
  var ids = Array.from(_selectedIds);
  if(!ids.length) return;
  await fetch('/api/notifications/mine/mark_read_batch', {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':_csrfToken},
    body: JSON.stringify({ids: ids})
  }).catch(function(){});
  var idSet = new Set(ids);
  _personal.forEach(function(n){ if(idSet.has(n.id)) n.is_read = true; });
  _updateUnreadUI();
  _exitSelectMode();
}
function _bulkDelete(){
  var ids = Array.from(_selectedIds);
  if(!ids.length) return;
  var count = ids.length;
  openDeleteConvoModal(function(){ _doBulkDelete(ids); }, {
    title: 'Delete ' + count + ' notification' + (count === 1 ? '' : 's') + '?',
    text: "This can't be undone."
  });
}
async function _doBulkDelete(ids){
  var r = await fetch('/api/notifications/mine/delete_batch', {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':_csrfToken},
    body: JSON.stringify({ids: ids})
  }).then(function(x){return x.json();}).catch(function(){return null;});
  if(r && r.ok){
    var idSet = new Set(ids);
    _personal = _personal.filter(function(n){ return !idSet.has(n.id); });
    _updateUnreadUI();
    _exitSelectMode();
  } else {
    openAlertModal({text:(r && r.msg) || 'Could not delete the selected notifications.'});
  }
}

_loadPersonal();
_loadTrades();
(function(){
  fetch('/api/me').then(function(r){ return r.json(); }).then(function(d){
    if(!d.ok && !d.wallet) return;
    var w = d.wallet||'';
    function _s(s){ return s?s.slice(0,4)+'…'+s.slice(-4):''; }
    var ini  = document.getElementById('sb-avatar-ini');
    var name = document.getElementById('sb-user-name');
    var hdl  = document.getElementById('sb-handle');
    var sol  = document.getElementById('sb-sol');
    if(ini)  ini.textContent  = (d.username||w)[0].toUpperCase();
    if(name) name.textContent = d.username||_s(w);
    if(hdl)  hdl.textContent  = d.username?'@'+d.username:_s(w);
    if(sol&&d.balance!=null) sol.textContent = parseFloat(d.balance).toFixed(3);
    if(d.avatar){
      var img = document.getElementById('sb-avatar-img');
      if(img){ img.src=d.avatar; img.style.display=''; }
    }
  }).catch(function(){});
})();
</script>
