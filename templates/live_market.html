<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live Market — OrcAgent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#0a0e1a;color:#eef1f5;font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── header ── */
.lm-header{position:sticky;top:0;z-index:30;background:#0a0e1a;border-bottom:1px solid #1a2035;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
.lm-header-title{font-size:18px;font-weight:700;color:#eef1f5;white-space:nowrap;display:flex;align-items:center;gap:6px}
.lm-header-title span{color:#35d4c4}
.lm-search-wrap{flex:1;max-width:380px;position:relative}
.lm-search{width:100%;background:#0d1525;border:1px solid #1a2035;border-radius:10px;padding:9px 14px 9px 36px;color:#eef1f5;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.lm-search::placeholder{color:#3d4b62}
.lm-search:focus{border-color:#35d4c4}
.lm-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#3d4b62;pointer-events:none;font-size:14px}
.lm-back{text-decoration:none;color:#3d4b62;font-size:13px;display:flex;align-items:center;gap:4px;transition:color .15s;white-space:nowrap}
.lm-back:hover{color:#eef1f5}

/* ── tabs ── */
.lm-tabs{display:flex;gap:4px;padding:16px 20px 0;border-bottom:1px solid #1a2035;background:#0a0e1a;position:sticky;top:60px;z-index:20}
.lm-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:#3d4b62;background:none;border:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:inherit;margin-bottom:-1px}
.lm-tab:hover{color:#eef1f5}
.lm-tab.active{color:#35d4c4;border-bottom-color:#35d4c4}

/* ── grid ── */
.lm-body{padding:20px;max-width:900px;margin:0 auto}
.lm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* ── card ── */
.lm-card{background:#101216;border:1px solid #21252c;border-radius:16px;padding:16px;cursor:pointer;transition:border-color .15s,transform .1s}
.lm-card:hover{border-color:#35d4c433;transform:translateY(-1px)}
.lm-card-row1{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lm-logo{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#1a2035;flex-shrink:0}
.lm-logo-placeholder{width:42px;height:42px;border-radius:50%;background:#1a2035;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#3d4b62;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.lm-card-meta{flex:1;min-width:0}
.lm-card-sym{font-size:15px;font-weight:700;color:#eef1f5;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lm-card-name{font-size:11px;color:#3d4b62;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lm-card-price{text-align:right}
.lm-price-val{font-size:15px;font-weight:700;color:#eef1f5;font-family:'JetBrains Mono',monospace}
.lm-price-chg{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:1px}
.lm-price-chg.up{color:#35d4c4}
.lm-price-chg.down{color:#f76b62}
.lm-price-chg.flat{color:#3d4b62}
.lm-card-stats{display:flex;gap:8px}
.lm-stat{flex:1;background:#0d1525;border-radius:8px;padding:8px}
.lm-stat-label{font-size:9px;color:#3d4b62;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.lm-stat-val{font-size:12px;font-weight:600;color:#eef1f5;font-family:'JetBrains Mono',monospace}

/* ── status ── */
.lm-status{text-align:center;padding:60px 20px;color:#3d4b62;font-size:14px}
.lm-spinner-ring{width:32px;height:32px;border:3px solid #1a2035;border-top-color:#35d4c4;border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── token modal ── */
#lm-token-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center;padding:16px}
.lm-modal-card{background:#0d1117;border:1px solid #21252c;border-radius:20px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;position:relative}
.lm-modal-close{position:absolute;top:14px;right:14px;background:#1a2035;border:1px solid #21252c;color:#8a919c;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:1;transition:color .15s}
.lm-modal-close:hover{color:#eef1f5}
@keyframes tcSpin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#21252c;border-radius:4px}
</style>
</head>
<body>

<header class="lm-header">
  <a class="lm-back" href="/">← Back</a>
  <div class="lm-header-title"><span>⚡</span> Live Market</div>
  <div class="lm-search-wrap">
    <span class="lm-search-icon">⌕</span>
    <input class="lm-search" id="lm-search" type="text" placeholder="Search any token…" autocomplete="off" oninput="_lmSearchDebounce(this.value)">
  </div>
</header>

<div class="lm-tabs" id="lm-tabs">
  <button class="lm-tab active" id="tab-trending"  onclick="_setTab('trending')">Trending</button>
  <button class="lm-tab"        id="tab-new"        onclick="_setTab('new')">New Pairs</button>
  <button class="lm-tab"        id="tab-gainers"    onclick="_setTab('gainers')">Gainers</button>
</div>

<div class="lm-body">
  <div class="lm-grid" id="lm-grid">
    <div class="lm-status" style="grid-column:1/-1"><div class="lm-spinner-ring"></div>Loading…</div>
  </div>
</div>

<!-- token detail modal -->
<div id="lm-token-modal" onclick="if(event.target===this)this.style.display='none'">
  <div class="lm-modal-card">
    <button class="lm-modal-close" onclick="document.getElementById('lm-token-modal').style.display='none'">✕</button>
    <div id="lm-modal-body" style="padding:20px"></div>
  </div>
</div>

<script>
'use strict';

/* ── state ── */
var _activeTab = 'trending';
var _cache     = {};
var _searchTimer = null;
var _isSearch  = false;

/* ── tab switching ── */
function _setTab(tab){
  _activeTab = tab;
  _isSearch  = false;
  document.getElementById('lm-search').value = '';
  ['trending','new','gainers'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if(_cache[tab]){ _renderGrid(_cache[tab]); }
  else { _loadTab(tab); }
}

/* ── data loading ── */
async function _loadTab(tab){
  _setLoading();
  try{
    var pairs;
    if(tab==='trending')  pairs = await _fetchTrending();
    else if(tab==='new')  pairs = await _fetchNew();
    else                   pairs = await _fetchGainers();
    _cache[tab] = pairs;
    _renderGrid(pairs);
  }catch(e){
    _setError('Failed to load data');
  }
}

async function _fetchTrending(){
  var r  = await fetch('https://api.dexscreener.com/token-boosts/top/v1');
  var items = await r.json();
  var solana = (Array.isArray(items) ? items : []).filter(function(i){ return i.chainId==='solana'; }).slice(0,20);
  if(!solana.length) return [];
  var iconMap = {};
  solana.forEach(function(i){ iconMap[i.tokenAddress] = i.icon; });
  var addresses = solana.map(function(i){ return i.tokenAddress; }).join(',');
  var pr = await fetch('https://api.dexscreener.com/latest/dex/tokens/'+addresses);
  var pd = await pr.json();
  return _dedupeByAddress(pd.pairs||[], iconMap);
}

async function _fetchNew(){
  var r    = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');
  var items = await r.json();
  var solana = (Array.isArray(items) ? items : []).filter(function(i){ return i.chainId==='solana'; }).slice(0,20);
  if(!solana.length) return [];
  var iconMap = {};
  solana.forEach(function(i){ iconMap[i.tokenAddress] = i.icon; });
  var addresses = solana.map(function(i){ return i.tokenAddress; }).join(',');
  var pr = await fetch('https://api.dexscreener.com/latest/dex/tokens/'+addresses);
  var pd = await pr.json();
  return _dedupeByAddress(pd.pairs||[], iconMap);
}

async function _fetchGainers(){
  var r  = await fetch('https://api.dexscreener.com/latest/dex/search?q=solana');
  var d  = await r.json();
  var pairs = (d.pairs||[]).filter(function(p){ return p.chainId==='solana'; });
  pairs.sort(function(a,b){
    var ac = a.priceChange&&a.priceChange.h24!=null ? a.priceChange.h24 : -Infinity;
    var bc = b.priceChange&&b.priceChange.h24!=null ? b.priceChange.h24 : -Infinity;
    return bc - ac;
  });
  return _dedupeByAddress(pairs.slice(0,30), {});
}

function _dedupeByAddress(pairs, iconMap){
  var seen = {};
  var out  = [];
  pairs.forEach(function(p){
    var addr = p.baseToken && p.baseToken.address;
    if(!addr || seen[addr]) return;
    seen[addr] = true;
    if(iconMap[addr] && !(p.info && p.info.imageUrl)){
      p = Object.assign({}, p, { _icon: iconMap[addr] });
    }
    out.push(p);
  });
  return out.slice(0,24);
}

/* ── search ── */
function _lmSearchDebounce(q){
  clearTimeout(_searchTimer);
  if(!q.trim()){
    _isSearch = false;
    if(_cache[_activeTab]) _renderGrid(_cache[_activeTab]);
    else _loadTab(_activeTab);
    return;
  }
  _searchTimer = setTimeout(function(){ _doSearch(q); }, 300);
}

async function _doSearch(q){
  _isSearch = true;
  _setLoading();
  try{
    var r = await fetch('https://api.dexscreener.com/latest/dex/search?q='+encodeURIComponent(q));
    var d = await r.json();
    var pairs = _dedupeByAddress((d.pairs||[]).filter(function(p){ return p.chainId==='solana'; }), {});
    _renderGrid(pairs);
  }catch(e){ _setError('Search failed'); }
}

/* ── render ── */
function _renderGrid(pairs){
  var grid = document.getElementById('lm-grid');
  if(!pairs.length){
    grid.innerHTML = '<div class="lm-status" style="grid-column:1/-1">No tokens found</div>';
    return;
  }
  grid.innerHTML = pairs.map(function(p,i){ return _cardHtml(p,i); }).join('');
}

function _cardHtml(p, idx){
  var sym   = (p.baseToken && p.baseToken.symbol) || '?';
  var name  = (p.baseToken && p.baseToken.name)   || '';
  var imgUrl = (p.info && p.info.imageUrl) || p._icon || '';
  var logo  = imgUrl
    ? '<img class="lm-logo" src="'+imgUrl+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
      +'<div class="lm-logo-placeholder" style="display:none">'+_esc(sym.slice(0,2))+'</div>'
    : '<div class="lm-logo-placeholder">'+_esc(sym.slice(0,2))+'</div>';

  var price = _fmtPrice(p.priceUsd);
  var chg24 = p.priceChange && p.priceChange.h24 != null ? p.priceChange.h24 : null;
  var chgCls = chg24 == null ? 'flat' : chg24 >= 0 ? 'up' : 'down';
  var chgTxt = chg24 != null ? (chg24 >= 0 ? '+' : '') + chg24.toFixed(2) + '%' : '—';
  var vol  = _fmtNum(p.volume  && p.volume.h24  != null ? p.volume.h24      : null);
  var liq  = _fmtNum(p.liquidity && p.liquidity.usd != null ? p.liquidity.usd : null);

  var safeSym = _esc(sym).replace(/'/g, "\\'");

  return '<div class="lm-card" onclick="showTokenCard(\''+safeSym+'\')">'+
    '<div class="lm-card-row1">'+
      '<div style="display:flex;align-items:center">'+logo+'</div>'+
      '<div class="lm-card-meta">'+
        '<div class="lm-card-sym">$'+_esc(sym)+'</div>'+
        '<div class="lm-card-name">'+_esc(name)+'</div>'+
      '</div>'+
      '<div class="lm-card-price">'+
        '<div class="lm-price-val">'+price+'</div>'+
        '<div class="lm-price-chg '+chgCls+'">'+chgTxt+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="lm-card-stats">'+
      '<div class="lm-stat"><div class="lm-stat-label">Vol 24h</div><div class="lm-stat-val">'+vol+'</div></div>'+
      '<div class="lm-stat"><div class="lm-stat-label">Liquidity</div><div class="lm-stat-val">'+liq+'</div></div>'+
    '</div>'+
  '</div>';
}

/* ── token modal ── */
async function showTokenCard(symbol){
  var modal = document.getElementById('lm-token-modal');
  var body  = document.getElementById('lm-modal-body');
  modal.style.display = 'flex';
  body.innerHTML = '<div style="text-align:center;padding:48px 0">'
    +'<div style="width:30px;height:30px;border:3px solid #1a2035;border-top-color:#35d4c4;border-radius:50%;margin:0 auto 14px;animation:tcSpin .8s linear infinite"></div>'
    +'<div style="color:#3d4b62;font-size:13px">Loading…</div>'
    +'</div>';
  try{
    var r = await fetch('https://api.dexscreener.com/latest/dex/search?q='+encodeURIComponent(symbol));
    var d = await r.json();
    var p = (d.pairs||[]).find(function(x){ return x.chainId==='solana'; });
    if(!p){
      body.innerHTML = '<div style="text-align:center;padding:48px 20px;color:#3d4b62;font-size:13px">No Solana pair found for $'+_esc(symbol)+'</div>';
      return;
    }
    var sym  = (p.baseToken&&p.baseToken.symbol)||symbol;
    var name = (p.baseToken&&p.baseToken.name)||'';
    var imgUrl = p.info&&p.info.imageUrl ? p.info.imageUrl : '';
    var logo = imgUrl
      ? '<img src="'+imgUrl+'" style="width:56px;height:56px;border-radius:50%;object-fit:cover;margin-bottom:10px">'
      : '<div style="width:56px;height:56px;border-radius:50%;background:#1a2035;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#3d4b62;margin:0 auto 10px;font-family:\'JetBrains Mono\',monospace">'+_esc(sym.slice(0,2))+'</div>';
    var price = _fmtPrice(p.priceUsd);
    var chg24 = p.priceChange&&p.priceChange.h24!=null ? p.priceChange.h24 : null;
    var chgColor = chg24!=null ? (chg24>=0?'#35d4c4':'#f76b62') : '#3d4b62';
    var chgStr   = chg24!=null ? (chg24>=0?'+':'')+chg24.toFixed(2)+'%' : '—';
    var tfs = [
      {l:'5m',  v:p.priceChange&&p.priceChange.m5 !=null?p.priceChange.m5 :null},
      {l:'1h',  v:p.priceChange&&p.priceChange.h1 !=null?p.priceChange.h1 :null},
      {l:'6h',  v:p.priceChange&&p.priceChange.h6 !=null?p.priceChange.h6 :null},
      {l:'24h', v:chg24}
    ];
    var statsHtml = [
      {l:'Volume 24h',  v:_fmtNum(p.volume&&p.volume.h24!=null?p.volume.h24:null)},
      {l:'Liquidity',   v:_fmtNum(p.liquidity&&p.liquidity.usd!=null?p.liquidity.usd:null)},
      {l:'Market Cap',  v:_fmtNum(p.marketCap||null)},
      {l:'Buys / Sells',v:p.txns&&p.txns.h24
          ? '<span style="color:#35d4c4">'+p.txns.h24.buys+'</span><span style="color:#3d4b62"> / </span><span style="color:#f76b62">'+p.txns.h24.sells+'</span>'
          : '—'}
    ].map(function(s){
      return '<div style="background:#1a2035;border-radius:10px;padding:10px">'
        +'<div style="font-size:10px;color:#3d4b62;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">'+s.l+'</div>'
        +'<div style="font-size:13px;font-weight:600;color:#eef1f5;font-family:\'JetBrains Mono\',monospace">'+s.v+'</div>'
        +'</div>';
    }).join('');
    var tfHtml = tfs.map(function(tf){
      var bg  = tf.v!=null ? (tf.v>=0?'rgba(53,212,196,.12)':'rgba(247,107,98,.12)') : '#1a2035';
      var col = tf.v!=null ? (tf.v>=0?'#35d4c4':'#f76b62') : '#3d4b62';
      var vs  = tf.v!=null ? (tf.v>=0?'+':'')+tf.v.toFixed(2)+'%' : '—';
      return '<div style="flex:1;background:'+bg+';border-radius:8px;padding:8px;text-align:center">'
        +'<div style="font-size:10px;color:#3d4b62;margin-bottom:3px">'+tf.l+'</div>'
        +'<div style="font-size:11px;font-weight:600;color:'+col+';font-family:\'JetBrains Mono\',monospace">'+vs+'</div>'
        +'</div>';
    }).join('');
    body.innerHTML =
      '<div style="text-align:center;padding-top:8px">'+logo
      +'<div style="font-size:22px;font-weight:700;color:#eef1f5;font-family:\'JetBrains Mono\',monospace">$'+_esc(sym)+'</div>'
      +'<div style="font-size:12px;color:#3d4b62;margin-bottom:14px">'+_esc(name)
        +' <span style="background:rgba(53,212,196,.12);color:#35d4c4;font-size:10px;font-family:\'JetBrains Mono\',monospace;padding:2px 7px;border-radius:5px;margin-left:4px;vertical-align:middle">SOLANA</span>'
        +'</div>'
      +'<div style="font-size:30px;font-weight:700;color:#eef1f5;font-family:\'JetBrains Mono\',monospace;margin-bottom:4px">'+price+'</div>'
      +'<div style="font-size:16px;font-weight:600;color:'+chgColor+';margin-bottom:20px;font-family:\'JetBrains Mono\',monospace">'+chgStr+' (24h)</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+statsHtml+'</div>'
      +'<div style="display:flex;gap:6px">'+tfHtml+'</div>';
  }catch(e){
    body.innerHTML = '<div style="text-align:center;padding:48px 20px;color:#f76b62;font-size:13px">Failed to load token data</div>';
  }
}

/* ── helpers ── */
function _fmtPrice(p){
  if(!p) return '—';
  var n = parseFloat(p);
  if(isNaN(n)) return '—';
  if(n >= 1000)  return '$'+n.toLocaleString(undefined,{maximumFractionDigits:2});
  if(n >= 1)     return '$'+n.toLocaleString(undefined,{maximumFractionDigits:4});
  if(n >= 0.001) return '$'+n.toLocaleString(undefined,{maximumSignificantDigits:4});
  return '$'+n.toExponential(2);
}
function _fmtNum(n){
  if(n==null||isNaN(n)) return '—';
  if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(2);
}
function _esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _setLoading(){
  document.getElementById('lm-grid').innerHTML =
    '<div class="lm-status" style="grid-column:1/-1"><div class="lm-spinner-ring"></div>Loading…</div>';
}
function _setError(msg){
  document.getElementById('lm-grid').innerHTML =
    '<div class="lm-status" style="grid-column:1/-1;color:#f76b62">'+msg+'</div>';
}

/* ── init ── */
_loadTab('trending');
</script>
</body>
</html>
