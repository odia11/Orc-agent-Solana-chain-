<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<meta name="client-secret" content="{{ client_secret }}">
<title>Live Market ‚Äî OrcAgent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0e;--bg2:#101216;--bg3:#16191f;--bg4:#21252c;--accent:#f7b955;--text:#eef1f5;--muted:#565d68;--green:#3ad29b;--red:#ff4d6a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}

/* header */
.lm-header{position:sticky;top:0;z-index:30;background:var(--bg);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bg3)}
.lm-header-title{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px;flex-shrink:0}
.lm-search-wrap{position:relative;flex:1;max-width:280px}
.lm-search{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;padding:7px 12px 7px 32px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.lm-search:focus{border-color:var(--bg4)}
.lm-search::placeholder{color:var(--muted)}
.lm-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px}
.lm-amount-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.lm-amount-label{font-size:10px;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.08em}
.lm-amount-input{width:68px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;-moz-appearance:textfield;transition:border-color .15s}
.lm-amount-input:focus{border-color:var(--accent)}
.lm-amount-input::-webkit-inner-spin-button,.lm-amount-input::-webkit-outer-spin-button{-webkit-appearance:none}
.lm-back{text-decoration:none;color:var(--muted);font-size:11px;white-space:nowrap;transition:color .15s;flex-shrink:0}
.lm-back:hover{color:var(--text)}

/* scanning pill */
.lm-scanning-pill{display:flex;align-items:center;gap:5px;background:rgba(58,210,155,.1);border-radius:20px;padding:5px 11px;font-size:10px;font-weight:700;color:var(--green);letter-spacing:.06em;flex-shrink:0;white-space:nowrap}
.lm-scan-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:scanBlink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes scanBlink{0%,100%{opacity:1}50%{opacity:.25}}

/* tabs */
.lm-tabs{display:flex;gap:6px;padding:12px 16px;background:var(--bg);position:sticky;top:56px;z-index:20;border-bottom:1px solid var(--bg3);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
.lm-tab{padding:7px 16px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;transition:all .15s;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.lm-tab:hover{color:var(--text);border-color:var(--bg3)}
.lm-tab.active{background:rgba(247,185,85,.12);color:var(--accent);border-color:rgba(247,185,85,.25)}

/* table wrapper */
.lm-table-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;overflow:hidden;margin:16px}
.lm-table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}

/* table */
.lm-table{width:100%;border-collapse:collapse;table-layout:auto;min-width:680px}
.lm-table thead th{padding:12px 14px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bg3);white-space:nowrap;text-align:right;background:var(--bg2)}
.lm-table thead th:first-child{text-align:left;padding-left:16px}
.lm-table thead th.th-act{text-align:center}
.lm-table tbody tr{border-bottom:1px solid var(--bg3);transition:background .15s;cursor:pointer}
.lm-table tbody tr:last-child{border-bottom:none}
.lm-table tbody tr:hover{background:#14171c}
.lm-table tbody td{padding:0 14px;height:60px;font-size:13px;white-space:nowrap;text-align:right;vertical-align:middle;color:var(--muted)}
.lm-table tbody td:first-child{text-align:left;padding-left:16px}
.lm-price-cell{color:var(--text);font-weight:700}
.td-act{text-align:center}

/* token cell */
.lm-tok-cell{display:flex;align-items:center;gap:10px}
.lm-tok-logo{width:36px;height:36px;border-radius:10px;object-fit:cover;flex-shrink:0}
.lm-tok-logo-ph{width:36px;height:36px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.lm-tok-name{font-size:13px;font-weight:700;color:var(--text)}
.lm-tok-sym{font-size:11px;color:var(--muted);margin-top:2px}

/* price change */
.chg-up{color:var(--green);font-weight:700}
.chg-dn{color:var(--red);font-weight:700}
.chg-fl{color:var(--muted)}

/* trade button */
.lm-btn-trade{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;border:none;border-radius:10px;padding:8px 18px;cursor:pointer;transition:opacity .15s;background:var(--accent);color:#0a0b0e;white-space:nowrap}
.lm-btn-trade:hover{opacity:.85}
.lm-btn-trade:disabled{opacity:.35;cursor:default}

/* inline trade dropdown */
.lm-drop-row td{padding:0;border-bottom:1px solid var(--bg3)}
.lm-drop-inner{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg)}
.lm-drop-label{font-size:11px;color:var(--muted);white-space:nowrap}
.lm-drop-input{width:80px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;-moz-appearance:textfield;transition:border-color .15s}
.lm-drop-input:focus{border-color:var(--accent)}
.lm-drop-input::-webkit-inner-spin-button,.lm-drop-input::-webkit-outer-spin-button{-webkit-appearance:none}
.lm-drop-confirm{background:var(--accent);color:#0a0b0e;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:opacity .15s}
.lm-drop-confirm:hover{opacity:.85}
.lm-drop-confirm:disabled{opacity:.35;cursor:default}
.lm-drop-sell-btn{background:var(--bg4);color:var(--red);border:1px solid rgba(255,77,106,.25);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.lm-drop-sell-btn:hover{background:rgba(255,77,106,.1)}
.lm-drop-cancel{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;padding:5px 8px;transition:color .15s}
.lm-drop-cancel:hover{color:var(--text)}

/* row flash */
@keyframes flashGreen{0%{background:rgba(58,210,155,.15)}100%{background:transparent}}
@keyframes flashRed  {0%{background:rgba(255,77,106,.15)}100%{background:transparent}}
.flash-green{animation:flashGreen 1.2s ease-out forwards}
.flash-red  {animation:flashRed   1.2s ease-out forwards}

/* status / loading */
.lm-status-row td{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.lm-spinner-ring{width:24px;height:24px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;margin:0 auto 10px;animation:spin .8s linear infinite;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* token modal */
#lm-token-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;align-items:center;justify-content:center;padding:16px}
.lm-modal-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;position:relative}
.lm-modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:color .15s;font-family:system-ui,sans-serif}
.lm-modal-close:hover{color:var(--text)}
@keyframes tcSpin{to{transform:rotate(360deg)}}

/* ‚îÄ‚îÄ MOBILE BACK BAR ‚îÄ‚îÄ */
.mobile-back-bar{display:none}
@media(max-width:767px){
  .mobile-back-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;position:sticky;top:0;z-index:30;background:#101216;border-bottom:1px solid #16191f}
  .mobile-back-btn{color:#f7b955;font-size:15px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .mobile-page-title{font-size:16px;font-weight:600;color:#eef1f5;font-family:inherit}
}
/* mobile ‚Äî CSS grid layout replaces table layout entirely */
@media(max-width:767px){
  html,body{overflow-x:hidden}
  .lm-header{display:none!important}
  .mobile-back-bar{height:52px}
  .lm-tabs{top:52px}
  .lm-back{display:none!important}
  .lm-amount-wrap{display:none}
  .lm-table-wrap{margin:8px}
  .col-hide{display:none!important}
  .lm-scanning-pill .lm-scan-label{display:none}

  /* Override table display ‚Äî each row becomes a CSS grid */
  .lm-table-scroll{overflow-x:hidden}
  .lm-table{display:block;width:100%;min-width:0}
  .lm-table thead{display:none}
  .lm-table tbody{display:block}
  .lm-table tbody tr{
    display:grid;
    grid-template-columns:48px 1fr 90px 70px 80px;
    align-items:center;
    min-height:56px;
    border-bottom:1px solid var(--bg3);
    padding:0 6px;
    cursor:pointer;
    transition:background .15s;
  }
  .lm-table tbody tr:not(.lm-drop-row):hover{background:#14171c}
  .lm-table tbody td{
    display:block;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    padding:8px 4px;
    min-width:0;
    text-align:right;
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
  }

  /* TOKEN cell spans logo column (48px) + name column (1fr) */
  .lm-table tbody td:first-child{
    grid-column:span 2;
    text-align:left;
    padding-left:2px;
    padding-right:6px;
    font-family:inherit;
  }

  /* Status rows and dropdown rows span all 5 columns */
  .lm-status-row td,
  .lm-drop-row td{
    grid-column:1 / -1;
    white-space:normal;
    text-align:center;
    padding:0;
    height:auto;
    min-height:0;
  }
  .lm-table tbody tr.lm-drop-row{min-height:auto}

  /* ‚îÄ‚îÄ Token cell: logo + stacked name/ticker ‚îÄ‚îÄ */
  .lm-tok-cell{
    display:flex;align-items:center;gap:8px;width:100%;overflow:hidden;min-width:0;
  }
  .lm-tok-logo,.lm-tok-logo-ph{
    width:36px;height:36px;font-size:10px;flex-shrink:0;border-radius:9px;
  }
  .lm-tok-cell>div{
    display:flex;flex-direction:column;gap:2px;overflow:hidden;min-width:0;flex:1;
  }
  .lm-tok-name{
    font-size:14px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:110px;
  }
  .lm-tok-sym{
    font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;
  }

  /* ‚îÄ‚îÄ Price cell ‚îÄ‚îÄ */
  .lm-price-cell{font-size:12px;font-weight:700;color:var(--text);text-align:right}

  /* ‚îÄ‚îÄ 24H% cell ‚îÄ‚îÄ */
  .td-chg24{font-size:13px;font-weight:700;text-align:right}

  /* ‚îÄ‚îÄ Trade cell ‚îÄ‚îÄ */
  .td-act{text-align:center;padding:4px 2px}
  .lm-btn-trade{
    min-height:44px;width:60px;padding:0;
    font-size:11px;font-weight:700;border-radius:10px;flex-shrink:0;
    background:var(--accent);color:#0a0b0e;
  }

  /* ‚îÄ‚îÄ Dropdown row ‚îÄ‚îÄ */
  .lm-drop-inner{flex-wrap:wrap;gap:6px;padding:8px 10px}
}

::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
</style>
</head>
<body>

<div class="mobile-back-bar">
  <button onclick="history.back()" class="mobile-back-btn">‚Üê Back</button>
  <span class="mobile-page-title">Live Market</span>
</div>

<header class="lm-header">
  <a class="lm-back" href="/">‚Üê Back</a>
  <div class="lm-header-title">Live Market</div>
  <div class="lm-scanning-pill">
    <span class="lm-scan-dot"></span>
    <span class="lm-scan-label">SCANNING</span>
  </div>
  <div class="lm-search-wrap">
    <span class="lm-search-icon">‚åï</span>
    <input class="lm-search" id="lm-search" type="text" placeholder="Search token‚Ä¶" autocomplete="off" oninput="_lmSearchDebounce(this.value)">
  </div>
  <div class="lm-amount-wrap">
    <span class="lm-amount-label">Amount SOL</span>
    <input class="lm-amount-input" id="lm-global-amount" type="number" min="0.001" step="0.1" value="0.1" title="SOL amount for quick buy">
  </div>
</header>

<div class="lm-tabs" id="lm-tabs">
  <button class="lm-tab active" id="tab-trending" onclick="_setTab('trending')">Trending</button>
  <button class="lm-tab"        id="tab-new"       onclick="_setTab('new')">New Pairs</button>
  <button class="lm-tab"        id="tab-gainers"   onclick="_setTab('gainers')">Gainers</button>
</div>

<div id="lm-table-wrap" class="lm-table-wrap"></div>

<!-- token detail modal -->
<div id="lm-token-modal" onclick="if(event.target===this)this.style.display='none'">
  <div class="lm-modal-card">
    <button class="lm-modal-close" onclick="document.getElementById('lm-token-modal').style.display='none'">‚úï</button>
    <div id="lm-modal-body" style="padding:20px"></div>
  </div>
</div>

<script>
'use strict';

/* ‚îÄ‚îÄ state ‚îÄ‚îÄ */
var _activeTab   = 'trending';
var _cache       = {};
var _searchTimer = null;
var _pairs       = [];

/* ‚îÄ‚îÄ tab switching ‚îÄ‚îÄ */
function _setTab(tab){
  _activeTab = tab;
  document.getElementById('lm-search').value = '';
  ['trending','new','gainers'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if(_cache[tab]){ _renderTable(_cache[tab]); }
  else { _loadTab(tab); }
}

/* ‚îÄ‚îÄ data loading ‚îÄ‚îÄ */
async function _loadTab(tab){
  _setLoading();
  try{
    var pairs;
    if(tab==='trending')  pairs = await _fetchTrending();
    else if(tab==='new')  pairs = await _fetchNew();
    else                   pairs = await _fetchGainers();
    _cache[tab] = pairs;
    _renderTable(pairs);
  }catch(e){
    _setError('Failed to load data');
  }
}

async function _fetchTrending(){
  var r     = await fetch('https://api.dexscreener.com/token-boosts/top/v1');
  var items = await r.json();
  var solana = (Array.isArray(items)?items:[]).filter(function(i){ return i.chainId==='solana'; }).slice(0,50);
  if(!solana.length) return [];
  var iconMap = {};
  solana.forEach(function(i){ iconMap[i.tokenAddress]=i.icon; });
  var addresses = solana.map(function(i){ return i.tokenAddress; }).join(',');
  var pr = await fetch('https://api.dexscreener.com/latest/dex/tokens/'+addresses);
  var pd = await pr.json();
  return _dedupeByAddress(pd.pairs||[], iconMap);
}

async function _fetchNew(){
  var r     = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');
  var items = await r.json();
  var solana = (Array.isArray(items)?items:[]).filter(function(i){ return i.chainId==='solana'; }).slice(0,50);
  if(!solana.length) return [];
  var iconMap = {};
  solana.forEach(function(i){ iconMap[i.tokenAddress]=i.icon; });
  var addresses = solana.map(function(i){ return i.tokenAddress; }).join(',');
  var pr = await fetch('https://api.dexscreener.com/latest/dex/tokens/'+addresses);
  var pd = await pr.json();
  return _dedupeByAddress(pd.pairs||[], iconMap);
}

async function _fetchGainers(){
  var trending = await _fetchTrending();
  var fresh    = await _fetchNew();
  var merged   = trending.concat(fresh);
  merged.sort(function(a,b){
    var ac = a.priceChange&&a.priceChange.h24!=null?a.priceChange.h24:-Infinity;
    var bc = b.priceChange&&b.priceChange.h24!=null?b.priceChange.h24:-Infinity;
    return bc-ac;
  });
  return _dedupeByAddress(merged, {});
}

function _dedupeByAddress(pairs, iconMap){
  var best={};
  pairs.forEach(function(p){
    var addr = p.baseToken&&p.baseToken.address;
    if(!addr) return;
    var liq = (p.liquidity&&p.liquidity.usd)||0;
    var prev = best[addr];
    if(!prev || liq > ((prev.liquidity&&prev.liquidity.usd)||0)){
      best[addr] = p;
    }
  });
  var out = Object.keys(best).map(function(addr){
    var p = best[addr];
    if(iconMap[addr]&&!(p.info&&p.info.imageUrl))
      p = Object.assign({},p,{_icon:iconMap[addr]});
    return p;
  });
  return out.slice(0,50);
}

/* ‚îÄ‚îÄ search ‚îÄ‚îÄ */
function _lmSearchDebounce(q){
  clearTimeout(_searchTimer);
  if(!q.trim()){
    if(_cache[_activeTab]) _renderTable(_cache[_activeTab]);
    else _loadTab(_activeTab);
    return;
  }
  _searchTimer = setTimeout(function(){ _doSearch(q); }, 300);
}

async function _doSearch(q){
  _setLoading();
  try{
    var r = await fetch('https://api.dexscreener.com/latest/dex/search?q='+encodeURIComponent(q));
    var d = await r.json();
    _renderTable(_dedupeByAddress((d.pairs||[]).filter(function(p){ return p.chainId==='solana'; }),{}));
  }catch(e){ _setError('Search failed'); }
}

/* thead ‚Äî 13 columns */
var _THEAD = '<thead><tr>'
  +'<th>TOKEN</th>'
  +'<th class="col-hide">MCAP</th>'
  +'<th class="th-price">PRICE</th>'
  +'<th class="col-hide">AGE</th>'
  +'<th class="col-hide">TXNS</th>'
  +'<th class="col-hide">VOLUME</th>'
  +'<th class="col-hide">TRADERS</th>'
  +'<th class="col-hide">5M</th>'
  +'<th class="col-hide">1H</th>'
  +'<th class="col-hide">6H</th>'
  +'<th class="th-chg24">24H%</th>'
  +'<th class="col-hide">LIQUIDITY</th>'
  +'<th class="th-act">TRADE</th>'
  +'</tr></thead>';

function _buildTable(tbodyRows){
  return '<div class="lm-table-scroll"><table class="lm-table">'+_THEAD+'<tbody id="lm-grid">'+tbodyRows+'</tbody></table></div>';
}

/* ‚îÄ‚îÄ render table ‚îÄ‚îÄ */
function _renderTable(pairs){
  _closeBuyDrop();
  _pairs = pairs;
  var wrap = document.getElementById('lm-table-wrap');
  if(!pairs.length){
    wrap.innerHTML = _buildTable('<tr class="lm-status-row"><td colspan="13">No tokens found</td></tr>');
    return;
  }
  wrap.innerHTML = _buildTable(pairs.map(function(p,i){ return _rowHtml(p,i); }).join(''));
}

function _chgCell(v, extra){
  var x = extra ? ' '+extra : '';
  if(v==null) return '<td class="chg-fl'+x+'">‚Äî</td>';
  var s=(v>=0?'+':'')+v.toFixed(2)+'%';
  return '<td class="'+(v>=0?'chg-up':'chg-dn')+x+'">'+s+'</td>';
}

function _rowHtml(p, idx){
  var sym  = (p.baseToken&&p.baseToken.symbol)||'?';
  var name = (p.baseToken&&p.baseToken.name)||sym;
  var addr = (p.baseToken&&p.baseToken.address)||'';
  var imgUrl = (p.info&&p.info.imageUrl)||p._icon||'';

  var logo = imgUrl
    ? '<img class="lm-tok-logo" src="'+imgUrl+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
      +'<div class="lm-tok-logo-ph" style="display:none">'+_esc(sym.slice(0,2))+'</div>'
    : '<div class="lm-tok-logo-ph">'+_esc(sym.slice(0,2))+'</div>';

  var price   = _fmtPrice(p.priceUsd);
  var mcap    = _fmtNum(p.marketCap||null);
  var vol     = _fmtNum(p.volume&&p.volume.h24!=null?p.volume.h24:null);
  var liq     = _fmtNum(p.liquidity&&p.liquidity.usd!=null?p.liquidity.usd:null);
  var txns    = p.txns&&p.txns.h24 ? (p.txns.h24.buys+p.txns.h24.sells).toLocaleString() : '‚Äî';
  var traders = p.txns&&p.txns.h24&&p.txns.h24.buyers!=null ? p.txns.h24.buyers.toLocaleString() : '‚Äî';
  var age     = _fmtAge(p.pairCreatedAt);

  var safeSym  = _esc(sym).replace(/'/g,"\\'");
  var safeAddr = _esc(addr).replace(/'/g,"\\'");
  var safePair = _esc(p.pairAddress||'').replace(/'/g,"\\'");

    +_chgCell(p.priceChange&&p.priceChange.h1 !=null?p.priceChange.h1 :null,'col-hide')

function _rowClick(e, sym){
  if(e.target.tagName==='BUTTON'||e.target.closest('button')) return;
  showTokenCard(sym);
}

/* ‚îÄ‚îÄ inline trade dropdown ‚îÄ‚îÄ */
var _openDropIdx = -1;

function _openBuyDrop(idx, sym, pairAddr, tokenAddr, btn){
  if(_openDropIdx === idx){ _closeBuyDrop(); return; }
  _closeBuyDrop();
  _openDropIdx = idx;

  var dataRow = document.getElementById('lm-row-'+idx);
  if(!dataRow) return;

  var inputId = 'lm-drop-amt-'+idx;
  var eSym  = _esc(sym).replace(/'/g,"\\'");
  var ePair = _esc(pairAddr).replace(/'/g,"\\'");
  var eAddr = _esc(tokenAddr).replace(/'/g,"\\'");

  var tr = document.createElement('tr');
  tr.id = 'lm-drop-'+idx;
  tr.className = 'lm-drop-row';
  tr.innerHTML = '<td colspan="13">'
    +'<div class="lm-drop-inner">'
      +'<span class="lm-drop-label">Trade <strong style="color:#f7b955">$'+_esc(sym)+'</strong></span>'
      +'<span class="lm-drop-label">SOL:</span>'
      +'<input class="lm-drop-input" id="'+inputId+'" type="number" min="0.001" step="0.1" value="0.1" onclick="event.stopPropagation()">'
      +'<button class="lm-drop-confirm" id="lm-drop-confirm-'+idx+'" onclick="event.stopPropagation();_confirmBuy('+idx+',\''+eSym+'\',\''+ePair+'\',\''+eAddr+'\')">Buy</button>'
      +'<button class="lm-drop-sell-btn" id="lm-drop-sell-'+idx+'" onclick="event.stopPropagation();_quickSell('+idx+',\''+eSym+'\',\''+ePair+'\',\''+eAddr+'\',this)">Sell All</button>'
      +'<button class="lm-drop-cancel" onclick="event.stopPropagation();_closeBuyDrop()">‚úï</button>'
    +'</div>'
    +'</td>';

  dataRow.insertAdjacentElement('afterend', tr);
  setTimeout(function(){ var el=document.getElementById(inputId); if(el) el.focus(); }, 30);
}

function _closeBuyDrop(){
  if(_openDropIdx < 0) return;
  var el = document.getElementById('lm-drop-'+_openDropIdx);
  if(el) el.remove();
  _openDropIdx = -1;
}

async function _confirmBuy(idx, sym, pairAddr, tokenAddr){
  var inputEl    = document.getElementById('lm-drop-amt-'+idx);
  var confirmBtn = document.getElementById('lm-drop-confirm-'+idx);
  var amount     = parseFloat(inputEl ? inputEl.value : '0.1');
  if(!amount || amount <= 0){ _toast('Enter a valid SOL amount', false); return; }
  if(confirmBtn){ confirmBtn.textContent='‚Ä¶'; confirmBtn.disabled=true; }
  var ok = await _doTrade(sym, pairAddr, 'buy', amount, tokenAddr);
  _closeBuyDrop();
  if(ok){ _flashRow(idx, true);  _toast('Bought $'+sym, true); }
  else  { _flashRow(idx, false); }
}

async function _quickSell(idx, sym, pairAddr, tokenAddr, btn){
  var origHtml = btn ? btn.innerHTML : '';
  if(btn){ btn.innerHTML='‚Ä¶'; btn.disabled=true; }
  var ok = await _doTrade(sym, pairAddr, 'sell', 0, tokenAddr);
  if(btn){ btn.innerHTML=origHtml; btn.disabled=false; }
  _closeBuyDrop();
  if(ok){ _flashRow(idx, false); _toast('Sold $'+sym, true); }
}

/* shared trade fetch */
async function _doTrade(sym, pairAddr, side, amount, tokenAddr){
  try{
    var _cs   = _lmClientSecret||(document.querySelector('meta[name="client-secret"]')||{}).content||'';
    var _csrf = (document.querySelector('meta[name="csrf-token"]')||{}).content||_lmCsrf||'';
    var r = await fetch('/api/instant-trade',{
      method:'POST',
      credentials:'include',
      headers:Object.assign({
        'Content-Type':'application/json',
        'X-CSRF-Token':_csrf,
        'X-CSRFToken':_csrf,
        'X-Requested-With':'XMLHttpRequest'
      }, _cs ? {'X-Client-Secret':_cs} : {}),
      body:JSON.stringify({symbol:sym, pair_address:pairAddr, side:side, amount_sol:amount, token_address:tokenAddr})
    });
    var d = await r.json();
    if(r.ok) return true;
    _toast((d.error||d.message||'Trade failed'), false);
    return false;
  }catch(e){
    _toast('Network error ‚Äî trade not sent', false);
    return false;
  }
}

function _flashRow(idx, green){
  var row = document.getElementById('lm-row-'+idx);
  if(!row) return;
  row.classList.remove('flash-green','flash-red');
  void row.offsetWidth;
  row.classList.add(green ? 'flash-green' : 'flash-red');
}

/* ‚îÄ‚îÄ toast ‚îÄ‚îÄ */
function _toast(msg, ok){
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);'
    +'background:#101216;color:#eef1f5;border:1px solid #16191f;'
    +'border-radius:12px;padding:11px 20px;font-size:13px;font-weight:700;'
    +'font-family:\'JetBrains Mono\',monospace;z-index:9999;pointer-events:none;'
    +'opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)';
  document.body.appendChild(t);
  requestAnimationFrame(function(){
    t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
    setTimeout(function(){
      t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(12px)';
      setTimeout(function(){ t.remove(); }, 250);
    }, 3000);
  });
}

/* ‚îÄ‚îÄ trade execution (modal) ‚îÄ‚îÄ */
async function executeTrade(symbol, pairAddress, side, amountStr, tokenAddress, btn){
  var amount = parseFloat(amountStr);
  if(!amount||amount<=0){ _toast('Enter a valid SOL amount', false); return; }
  var origHtml = btn ? btn.innerHTML : '';
  var origBg   = btn ? btn.style.background : '';
  var spinner  = '<span style="display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,.25);border-top-color:rgba(0,0,0,.6);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle"></span>';
  if(btn){ btn.innerHTML=spinner; btn.disabled=true; }
  var ok = await _doTrade(symbol, pairAddress, side, amount, tokenAddress);
  if(btn){ btn.innerHTML=origHtml; btn.disabled=false; btn.style.background=origBg; }
  if(ok) _toast(side==='buy' ? 'Buy order executed' : 'Sold', true);
}

/* ‚îÄ‚îÄ helpers ‚îÄ‚îÄ */
function _fmtPrice(p){
  if(!p) return '‚Äî';
  p = parseFloat(p);
  if(isNaN(p)||p<=0) return '‚Äî';
  if(p>=1) return '$'+p.toFixed(2);
  if(p>=0.0001) return '$'+p.toFixed(6);
  return '$'+p.toFixed(10).replace(/0+$/,'');
}
function _fmtNum(n){
  if(n==null||isNaN(n)) return '‚Äî';
  if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(2);
}
function _fmtAge(ms){
  if(!ms) return '‚Äî';
  var diff = Date.now()-ms;
  var mins = Math.floor(diff/60000);
  if(mins<1)  return '<1m';
  if(mins<60) return mins+'m';
  var hrs = Math.floor(mins/60);
  if(hrs<24)  return hrs+'h';
  return Math.floor(hrs/24)+'d';
}
function _esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _setLoading(){
  document.getElementById('lm-table-wrap').innerHTML =

}
function _setError(msg){

    _buildTable('<tr class="lm-status-row"><td colspan="13" style="color:#ff4d6a">'+msg+'</td></tr>');
