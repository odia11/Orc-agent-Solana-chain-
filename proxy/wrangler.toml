name                  = "orcagent-jupiter-proxy"
main                  = "worker.js"
compatibility_date    = "2024-09-01"
compatibility_flags   = ["nodejs_compat"]

# Workers free tier: 100,000 requests/day — more than enough for a trading bot.
# The worker URL after deploy looks like:
#   https://orcagent-jupiter-proxy.<your-subdomain>.workers.dev

# ── Quick-start ──────────────────────────────────────────────────────────────
# 1. npm install -g wrangler
# 2. wrangler login
# 3. cd proxy && wrangler deploy
# 4. Copy the deployed URL into Railway Variables:
#      JUPITER_PROXY_URL = https://orcagent-jupiter-proxy.<subdomain>.workers.dev
#
# Optional: lock the proxy so only OrcAgent can use it:
#   wrangler secret put PROXY_SECRET      ← paste any random string when prompted
#   Set JUPITER_PROXY_SECRET=<same value> ← in Railway Variables
# ─────────────────────────────────────────────────────────────────────────────
