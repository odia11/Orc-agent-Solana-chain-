<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#080c14"/>
  <!-- Body oval -->
  <ellipse cx="16" cy="19" rx="12" ry="10.5" fill="#0d2a1e" stroke="#00ff88" stroke-width="1.2"/>
  <!-- Head bump -->
  <ellipse cx="16" cy="11.5" rx="7.5" ry="6.5" fill="#0d2a1e" stroke="#00ff88" stroke-width="1.1"/>
  <!-- Eyes (green) -->
  <circle cx="12.5" cy="10.5" r="2.2" fill="#00ff88"/>
  <circle cx="19.5" cy="10.5" r="2.2" fill="#00ff88"/>
  <!-- Pupils -->
  <circle cx="13" cy="10" r="0.9" fill="#080c14"/>
  <circle cx="20" cy="10" r="0.9" fill="#080c14"/>
</svg>
